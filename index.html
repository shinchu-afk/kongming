        const Sparkles = (props) => (
             <IconBase {...props}>
                <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .962 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .962L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.962 0z"></path>

        // --- 完整 384 籤資料庫 ---
        const rawPoems = [
            ["天門一掛榜，預定奪標人，馬嘶芳草地，秋高聽鹿鳴。", "大吉，事業、財運、健康、婚姻均順遂。", "見龍在田，利見大人。君子得之，終日乾乾。夕惕若，以是自強不息。居上不驕，在下不憂。大吉。"],
            ["地有神，甚威靈，興邦輔國，尊主庇民。", "神護籤，言行循規蹈矩，事業上必有貴人相助，婚姻得人，健康亦佳", "謀望一切，必可順遂。官吏有超遷之喜，士人有功名之慶。占前程者，福壽綿長；占事業者，根基牢固；惟求財無望。"],
            ["長安花不可及，春風中馬蹄疾，急早加鞭，驟然生色。", "惕勵不可好高騖遠，目前情況不理想。", "能吃苦中苦，方爲人上人。占者，務須猛著祖鞭，力求上進。若自爲有恃無恐，則不進反退。"],
            ["春花嬌媚，不禁雨打風飄，秋菊幽芳，反耐霜淩雪傲。", "勉惕類，諸事無法順利，踏實或有可望。", "主大器晚成，得意必在暮年。若青年得志，必如秦之甘羅，唐之王勃。雨打風飄，示警。"],
            ["春雷震，夏風巽，臥龍起，猛虎驚，風雲會合，救濟蒼生。", "否極泰來，外旱逢甘雨，不過婚姻恐有波瀾，出外旅遊亦不宜。", "有待時而動之義，占者必潛蓄精神爲奮發地。卻不可輕舉妄動，致轉取戾。順之者吉，逆之者否。"],
            ["非玄非奧，非淺非深，一個妙道，著意搜尋。", "心性勿操切，著意搜尋，必能如願。", "一個悶葫蘆，無人打得破；故自來少參透事情之人，在使人搜尋妙道。而妙道實亦並不奇妙，在人自悟。"],
            ["君須悟，勿誤疑，有平路，任驅馳，隨時變易，件件咸宜。", "應機警應變，始能左右逢源。", "人情險惡，世態炎涼。然能拿定方針，隨機應變，亦識時務之俊傑，占得當可無咎。"],
            ["虎戀高山別有機，眾人目下尚狐疑，雁來嘹嚦黃花發，此際聲名達帝畿。", "目前無人能識，日後必受眾人讚頌，懷才不遇者得此籤，日後必發達。", "絳老辱在泥塗，意在靜觀時機，一旦運至自然亨通。占者，一切謀望須待菊花大放之際。"],
            ["貴客相逢更可期，庭前枯木鳳來儀，好將短事求長事，休聽旁人說是非。", "命中得遇貴人相助，未婚男子可得佳侶，商人則應有主見，始能獲利。", "有人提拔，事事順心，竟出意料之外。然非積德修持，無此希望，君子占之吉，小人占之凶。"],
            ["嘹嚦征鴻獨出群，高飛羽翼更糾紛，雲程北進好音遂聞，朝雲暮雨交加有憑。", "才氣出眾，無奈受制，去向宜北，可獲佳遇。", "功名富貴勤苦方得，盡人事，皇天不負。若懶惰或始勤終息，而欲望飛達，無異南轅北轍。"],
            ["無蹤又無跡，遠近均難覓，平地起風波，似笑還成泣。", "諸事不利。", "主有喪亡之患，哭泣之哀。凡事不利，有名無實。且有非常之災。占者須戒謹恐懼，時時修省以解祥。"],
            ["神黯黯，意悠悠，收卻線，莫下鉤。", "諸事暫且打住，免有失誤，後悔莫及。", "不宜妄想，只可謹守避禍，免惹是招非，否則動輒得咎，悔之晚矣。"],
            ["得意宜逢婦，前程去有緣，利名終有望，三五月團圓。", "吉，留意三、五有關月日，或有殊遇、喜事。", "謀爲有成，凡事有緣，求妻者得佳婦，求事者得佳事，談笑中立可成功。所謂吉人天相，三五月，期之近者。"],
            ["鼎沸起風波，孤舟要渡河，巧中卻藏拙，人事轉蹉跎。", "不吉，須防樹大招風，問婚姻或家人相處者，並爭紛頗烈。", "趨吉避凶，，人之常情，若一旦遇變故而巧於趨避，非惟自問不安，即天人亦不容，人事蹉跎，所以戒之者深，占者當不避艱險，勉持危局。"],
            ["意在閒中信未來，故人千里自徘徊，天邊雁足傳消息，一點梅花春色回。", "一切期待，均有可得，但須再等待一段時間。", "此籤沉滯已久，困而將亨之象。然亦必須梅花初放，始得好消息，占之者宜稍安勿躁。"],
            ["心和同，事知同，門外好施功，交加事有終。", "得此籤者，不合者必復合。", "同舟共濟，出門有功。占者不可損人利己，不可唯我獨尊。否則虎頭蛇尾，永無斷金之利。"],
            ["欲行還止，徘徊不已，藏玉懷珠，寸心千里。", "處於蓄勢欲發又遲疑難決者，宜下定決心，完成大業。", "首宜謹慎，凡事色舉翔集，審度而後進退。倘操切從事，必擲珠玉於泥沙，不免自暴自棄，戒諸。"],
            ["心戚戚，口啾啾，一番思慮一番憂，說了休時又不休。", "不利，結局恐難有望。", "主患得患失，如駑馬戀棧豆，無果決之作爲，故枉費心機，徒取煩惱。"],
            ["不遠不近，似易似難，等閑一事，雲中笑看。", "平平，成敗利鈍淡然處之。", "主一切疑難，不問遠近難易。均須自作主張，但求參透玄機。不難迎刃而解。雲中笑看，得意時也。"],
            ["桃李謝春風，西飛又復東，家中無意緒，船在浪濤中。", "栽種不得其時，去向漂流不定，遠行旅程不順，家庭亦有風波。", "事業不利，疾病不定，婚姻無望，出行所如輒阻。訟事，凶多吉少，一浮沈之象，此者亟修省。"],
            ["一水遠一水，一山旋一山，水窮山盡處，名利不為難。", "須費盡九牛二虎之力始克有成。", "主曆盡艱險，方能告成，絕地逢生，畢竟柳暗花明又一村。故貧困所以玉汝，忍性所以有爲。"],
            ["事相扶，在半途，翻覆終可免，風波一點無。", "目前不順，惟亦不致有風險。", "主彼此相助，事茂不濟；正人君子，誠信相孚。無翻雲覆雨之慮，故能一帆風順。"],
            ["喜喜喜，春風生桃李，不用強憂煎，明月人千里。", "喜訊已到，故人安然無恙，健康痊癒在即，婚姻可期。", "否極泰來，由困而複，千里之外故人，自盡力援手，今凡百順遂，若強憂煎，是自尋苦趣。"],
            ["意孜孜，心戚戚，要平安，防出入。", "謹言慎行，始得平安。", "安分守己，謹防出入，商賈勿大鬥小秤，士子勿誣聖譏賢，在朝勿貪詐，在野勿爭鬥，宜深味之。"],
            ["見不見，也防人背面，遇不遇，到底無憑據。", "應防來自西方之暗箭，所問之事尚無徵候。", "命蹇時乖，群陰播弄，失物難尋，六甲欠安，規行矩步，庶可免禍。"],
            ["一番桃李一番春，誰識當初氣象新，林下水邊尋活計，見山了了稱心意。", "或可任新職，經營事業以農林漁牧為宜，患病者宜換醫生並到山水處靜養。", "進不如退，行不如藏，富不如貧，達不如窮，能處處恬淡，即是處處保守，魚樵農圃，轉可安居，富貴尊榮，今非昔比。"],
            ["莫怪我見錯，心性自成痾，偏僻不通心，真人卻不魔。", "不可固執己見，心性偏執者，宜修養心性。", "智珠在抱，成竹在胸，不受他人愚，不遭世人迷，見錯自不錯，真人自有真，占者自決則吉，從人則凶。"],
            ["祿馬交馳，男兒得志時，行程早辦，榮歸樂期頤。", "吉祥，若卜仕途宦海之事，尤稱合適。", "此籤勉人時來運至，宜聞雞起舞，勿坐失時機，他日衣錦榮歸，耄年清福，繫於當日遭際時決之。"],
            ["了卻心頭事，三生夙有緣，香開十里桂，移步入天邊。", "大吉大利，尤對男女姻緣，桂香之時，約為秋季為宜。", "爲己即是爲人，故政身青雲。香聞十裏，雖系三生之緣，亦即自食其報，占者宜益自策勵，以期上答天心。"],
            ["緣黃閣白了頭，畢竟成何濟，不如趁此精神，猶好買些真氣。", "攀權附貴者宜回頭，頂天立地重新做人，否則不得善終。", "此籤力戒躁動勉守安靜，毋貪非分毋逞妄想，留有限之精神，培無窮之元氣，若君子占之以是求福，小人占之以是禍。"],
            ["離別間，雖不易，同伴行，猶不滯，早早起程，免他失意。", "平平，創業須結伴。", "謀爲始雖不免阻滯，久後還得順利。只須當機立斷，切莫因循自誤，致老大徒傷悲。"],
            ["樂之極憂將至，巽兌分明吉與凶，未能光大終幽暗，日落西山返照中。", "不祥。", "順利之來無永久，橫逆之加難倖免，天在上爲吉，水在下爲凶，占者當逆來順受，屈以求伸，目下黑暗，久後亦得回光返照，如落日映霞。"],
            ["歷過波濤三五重，誰知浪靜又無風，須教明達青雲路，用舍行藏不費功。", "平平。", "苦未盡甘已來，風平浪靜，直上青雲。占此籤者諸事利吉，不用憂慮。"],
            ["缺月又重圓，枯枝色更鮮，一條夷坦路，翹首望青天。", "吉昌", "暫時偃蹇終得大伸，宛如枯木逢春，又如山行忽得康莊，示人以偶然落魄，但居仁由義不患人之不知也。"],
            ["行路難行路難，今日方知行路難，前程廣大何足慮，瓊力今朝度此灘。", "一向平順，今突生險，惟必可過關。", "諸事遲滯，賴有定識定力，涉險濟深，始得誕登彼岸，見凡事謀爲，在於有志，非可坐致，其義微矣遠矣。"],
            ["春景明，春色新，春意傍水生，春天無限好，好去宴瓊林。", "事業發達，健康良好，性情豁達，交遊廣闊。", "春爲萬物更新之始，人得春氣，自有發旺景象，無限好，言勵志貴乘時，宴瓊林，言結果必佳美也，急宜奮勉。"],
            ["萬馬歸元，千猿朝洞，虎伏龍降，道高德重。", "須以德化人。", "主君子賢人，名望所歸，即使衆口鑠金，終不能埋沒真才實學。歸元朝洞，正以喻泰斗之足令人敬仰。"],
            ["黃鸝報上林，春色鮮明，提鞭快著，馬上速行程。", "做任何事，目前時機最佳。", "般樂怠敖，失業之源，宴安鳩毒，失時之本，行事須早，切莫因循，急起直追，攸往鹹利，占者飛黃騰達，可爲預賀。"],
            ["大肆放靈丹，救人行萬千，到頭登彼岸，渡過入仙班。", "行善濟人，必得善果，醫生得此籤，必為名醫，教師得此籤，必為名師。", "有大覺大悟，普渡衆生之義，引人登彼岸，自身入仙班，言爲人謀忠，已必不沈淪在下，行善事者，自獲善報，百不失一。"],
            ["一帶水，碧澄澄，舟住江上，月到天心；穩步其中，玄妙不閒，非人誤己，幾喪生身。", "塞翁失馬，焉知非福，諸事均欠順遂，惟尚未鑄下大錯，還能全身而退。", "主輕信人言，優柔寡斷，以坐井觀天之見，爲捕風捉影之事，故幾致喪身，占此者，可不戒備。"],
            ["桃李舒姘，春光鮮麗，良辰美景君須記，隨心所往事事相宜，無用多疑干瀆神祗。", "吉祥，命中註定事事順利，多疑而缺乏自信，將辜負上天恩寵。", "示人既凡百稱心遂意，便當及時行樂，不可仍不知足，今日因某事許願，明日又爲某事求禱，以幹瀆神明，惟修身以行善可已。"],
            ["隱中顯，顯中微，個中有玄機，參得透了，直上仙梯。", "所問之事呈膠著狀態，僅憑蛛絲馬跡研判，是否突破就看能否參透玄機。", "玄機不玄，道本中庸，聖賢仙佛，只是行中庸之道，遂爲千百世所景仰。常人欲上仙梯，何難之有；慎勿謂玄機隱微，甘居人後。"],
            ["無上去，在前頭，回頭一悟，繩韁好收，千條萬線路常在，自好搜求。", "所問之事可能走錯方向，即改絃易轍，另覓可行之路。", "主見機而作，不俟終日，古來明哲保身，決不專走死路，懸崖勒馬，別作他圖，貴獨具雙眼耳。"],
            ["四顧無門路，桃源路可通，修煉成正果，萬歲壽如松。", "平平，一生行運不通，惟尚有一線之路，只要多磨練、苦修，日後自成。", "主禍福無門，惟人自召，放下屠刀，立地成佛，苦心修煉，必不自落凡庸，占此者當知榮辱之機已實操之，不必怨天尤人。"],
            ["不用忙，不用慌，自有駐足鄉，鳴鼓響鐘地，三寶見門牆。", "做事沈著穩定，自有容身之地，多熱心公益，門庭自逢佳運。", "一切所爲，概須腳踏實地，不必行險僥倖，自有安身立命之所。"],
            ["奔波一世，總是虛浮，無常一到萬事休，急早回頭。", "一生爭名奪利，最後化為烏有，回頭是岸。", "言人生一飲一啄，莫非前定。要爲兒孫作馬牛，遠不如及早廣種福田，尚可貽澤後世，占此者可以悟矣。"],
            ["真真真，人不識，真真真，神有靈，歸宗返本，方是元精。", "諸事假象蒙蔽，誤入歧途，認清真象，轉入正途。", "主真爲美德，人雖不知，而神則知，故一念真誠，鬼神可格，金石爲開，占此者，務當摒棄虛僞，力求真實，勿欺人以自欺。"],
            ["走盡天涯，風霜歷遍，不如問人三天，漸漸有回首見。", "冒目躁進必白費功夫，應就教賢達。", "主捨近求遠，一事無成，徒自勞苦，益時運不濟，強求無益。占此者，須明心見性，盡可安貧樂道，毋庸逆天而行。"],
            ["沈沈痾染，不見天心，雷門一震，體健身輕。", "久病者突逢良醫，立即恢復健康，經營事業不佳者，可望獲良才，興隆有望。", "機緣不至，困如涸轍之鮒，一旦得水自攸然逝。占此籤者忍耐需時，不必焦急，時至便扶搖直上，非復當年之困屯也。"],
            ["財馬兩匆忙，官祿有定方，豬羊牛犬，自去主張。", "順其自然。", "主官運亨通，財星高照，富貴尊榮，造物安排已定，占者吉。"],
            ["空空空，空裡得成功，蟠桃千載熟，不怕五更風。", "大器晚成，若問財運，得此籤不祥，若問訴訟，則於纏訟多日可獲勝訴。", "積久必彰，豐久必發，根基堅固，無從震撼，空而不空，自然騰達，占此者知積善之家，必有餘慶，可立而待。"],
            ["愁臉放，笑顏開，秋月掛高臺，人從千里來。", "吉祥，心境漸漸開朗，環境已轉佳境，尋人定然相遇，其他亦有轉機。", "主行人即歸，謀望可成，得人扶助，久旱逢霖，佳兆，占之大吉。"],
            ["須著力，莫遠遊，長竿釣向蟾蜍窟，直欲雲中得巨鰲。", "勗惕之籤，凡事須全力以赴，不可貪玩疏忽，時運來臨，願望自然可成。", "主謀斡須勤，奔波徒勞，必用鐵槍磨針之功，方能漸入佳境，占此者可望上進，但須曆過辛勤。"],
            ["無蹤無跡，遠近難覓，旱海行舟，空勞費力。", "諸事難成。", "主諸事不吉，占病不利，名財兩空，胎孕有驚，行人不至，謀事不遂，能自猛省，亦可挽回天心。"],
            ["細雨濛濛濕，江邊路不通，道途音信遠，憑仗借東風。", "時運欠佳，一切難望有成，惟有依靠僅有之一線生機。", "主得人吹噓，但須耐心靜守，鷦鷯一枝或有望，若急於成就，則塞而不通。"],
            ["平地起雲煙，時下未能安，高處覓姻緣。", "所問之事現時現地均難有成，如問姻緣，須向顯赫人家去求，如問事業，波折重重。", "主事業沈滯，時運未濟，且有年災月晦。只可靜以候之，兼小心謹慎，欲求婚緣，須向高處，占此者速潛伏守己，以免禍害。"],
            ["正直宜守，妄動生災，利通名達，葉落花開。", "應堅守本位，正直無欺。", "爲人只須正直，切不可隨波逐流，與世浮沈。能如此則名成利就，可操勝券，葉落花開者，理之自然，占此者務以存心正直爲要。"],
            ["君子升，小人阻，征戰生離苦，前有吉人逢，信在馬牛人在楚，事要營求妥。", "所問之事波折連連，有人玉成，有人破壞，無地利之便，須穩妥安排為宜。", "一陽來複，群陰潛逃，雖路遇吉人，仍須自己安排，方爲妥善，不可全然恃他人，信在牛馬人在楚，戒之。"],
            ["紛紛復紛紛，欷歔獨掩門，歛眉望燈火，伴我坐黃昏。", "須守時耐運，待機而行，不可強求。婦人求得此籤，恐有夫妻失和情事。", "此籤主世道大變，時不我與，隱居獨處，嘆道不行，占此者有獨坐守窮之慮，凡百營為，均宜暫時中止。"],
            ["紅顏美，休掛懷，人在車中，舟行水裡。", "戒之在色，凡事不可存奢望。", "此籤戒妄想非分，只宜守身安命，若馳鶩遠，徒亂人意，終仍無一成就。占之者切勿輕舉妄動，就像美人在車，看自己則在船裡，不相關也。"],
            ["橋已斷，路不通，登舟理楫，又遇狂風。", "大不吉，凡事宜慎。", "橋斷路絕，舟破風狂，命運可知，占此者能積德修身，廣種福田，自可轉危爲安，逢凶化吉，若仍誅求無厭，勢必災禍臨身。"],
            ["深潭月，照鏡影，一場空，安報信。", "水底月，鏡中花，花藍打水一場空。", "有財不招，家口多病，六甲無望，婚姻不成，功名蹭蹬，行人無信，官司口舌，均屬難免，占此者省些精神，勿爲無益之事。"],
            ["湖海意悠悠，煙波下釣鉤，若逢龍與兔，名利一齊周。", "示人胸襟以闊，達觀為懷，自可名利雙收。(注意龍兔年或屬龍兔之人)", "交已辰流年，名利雙收，又逢已辰生年之人，亦得提攜扶助之德，占此者須細加思量，遵而行之。"],
            ["物不牢，人斷橋，重整理，慢心高。", "所問之事應重新來過，如以篤實之態度為之，或有可成。", "有另起爐竈，再整乾坤之象，占者，須勤懇做去，又應乾惕自厲，毋輕心以掉之，庶可光復舊物。"],
            ["入而易，出而難，懨懨到再三，交加意不堪。", "請神容易送神難。", "易進難退，鳥脫樊籠而不得；魚離網鈎而不能；淹滯久久，難望跳出大坑，占此者有擾懷不寧，意緒紛如之象。"],
            ["事遲志速，而且反覆，直待歲寒，花殘果熟。", "若時機未熟，但憑己力，尚難成就。婦女得此籤，顯示心意不足，青春蹉跎。", "此籤謀事宜緩求，急則非徒無益，而且反覆不成；一交冬令自獲豐收，可以不勞而得。占者耐心守候，莫嘆不如意為是。"],
            ["乘馬前進，所求吉貞，隨時諧美，缺月重明。", "一鼓作氣，勇往直前，即使往昔曾犯缺失，如今亦可重獲振作之機。", "宜動不宜靜，宜遠不宜近，攸往鹹利到處遇合，故有缺月重圓之象，占此者大吉。"],
            ["舟離古渡月離雲，人出潼關好問津，且向前行去求住，何須疑慮兩三心。", "此籤主外，出遠行有利，得此籤者，所問之事難題已解，難關已破，從此坦途。", "出門有功，占此者皆可投袂而起徑前邁往，前去自有機緣湊合，不必首鼠兩端，進退維谷，致自誤前程。"],
            ["不足不足，難伸心曲，野塘雨過月如鉤，夢斷邯鄲眉黛愁。", "知足常樂，隨遇而安，否則夢境難圓之慨，婦女得此籤，宜勉力拋虛榮之心。", "防有盜賊之侵，死亡之慮，夫妻分離之苦，親友嫌隙之咎，主家業退敗，人口凋零，急需修德，務使內省不疚，或可得神人保佑。"],
            ["美有堪，堪有美，始有終，終有始。", "為人追求真善美方為正途，凡事必以始終一貫精神為之。", "主無子得子，無事得事，無財得財，婚姻有魚水之歡，親朋有膠漆之誼，凡事機緣，無不和合，向來運蹇，至此俱得亨通，失意時占之最驗。"],
            ["湖海悠悠，孤舟浪頭，來人未渡，殘照山樓。", "所問諸事尚在虛無飄渺間，當前處境未開，心緒至為鬱悶，情境蒼茫。", "浮沈無定，如浪打水萍，風飄飛絮。目下尚無援助之人，只得守株待兔，未許臨淵羡魚，諸宜小心，安分爲上。"],
            ["深戶要牢扃，提防暗裡人，莫言無外事，縱好定遭迍。", "無事須當有事，有事更加防範，得此籤者須注意門戶以防竊，謹言慎行免招禍。", "凶禍將來，官司臨頭，是非將至，凡事謀望不成，求財交易不就，所爲無一順利，兼防受人暗算，只宜退守，不可前進。"],
            ["江海悠悠，煙波下鉤，六鰲連獲，歌笑中流。", "此籤大吉，凡謀事、創業必有望，且連獲成功，尤其逢「六」數，更具喜色也。", "主功名富貴，均各有分，踏破鐵鞋無覓處，得來全不費功夫，占此者喜氣重重可賀可賀。"],
            ["欲濟未濟，欲求強求，心無一定，一車兩頭。", "三心二意，有違常理，動彈不得，得此籤者，所問諸事均呈膠著狀態。", "欲濟未濟，言可進不進，欲求強求，言得所不得，心無一定，但徘徊歧路，一車兩頭，但中止於半途，占此者必虎頭蛇尾之人。"],
            ["一得一慮，退後欲先，路通大道，心自安然。", "得意之時勿忘形，失敗之後勿失志，不行歪路，心境自然安適。", "凡事吉利，切莫墮志，再能一心向善，自有好處，總之直道而行，無愧無怍，即不能十分得志，天君終亦泰然，勝於枉道幹求者遠矣。"],
            ["難難難，忽然平地起波瀾，易易易，談笑尋常終有望。", "機遇欠佳時，人在家中坐，禍從天上來，行運轉佳時，一切左右逢源，得心應手。", "現在光景，禍患紛乘，幾令人懊悶欲死，孰料剝複遁更，窮通不定，塞翁失馬，即因禍而得福，從此名成利就，大吉大利，先難後易之象。"],
            ["心有餘，力不足，倚仗春風，一歌一曲。", "所問之事，自己心餘力絀，無法獨力完成，但會有外力來助，結果仍稱圓滿。", "所願雖奢，末能滿欲，幸上天有梯，何畏天高，分水有犀，無憚水深，得人扶助，訖可小康，占此者善與人交，庶得因人成事。"],
            ["身不安，心不安，動靜兩三番，終朝事必歎。", "問健康，應多運動，問事業，則現危機，需多所奔走，問婚姻，處倦怠狀，需努力。", "求進反退，勞而無功，踞天踏地，自歎無可奈何，占此者宜虛中集益，毋跋前顧後。"],
            ["事了物未了，人圓物未圓，要知端的信，日影上琅玕。", "人、事問題，均了斷並圓滿解決，有關物則否，得此籤，恐有財務糾紛並涉訟。", "中道艱險，費盡周旋，事業尚難成就，婚姻只有一半，確實消息，在八月間，若能猛進修持，佳音旦夕可期。"],
            ["木向陽春發，三陰又伏根，樵夫不知道，砍去作柴薪。", "不可暴殄天物，對事物體認不夠，任意扔棄濫用，豈不可惜。", "英雄豪傑常人每易忽過，目為無用之人，占者必困龍失勢遂受蠅蚋之欺，一旦雲興雨降，昂首飛騰方顯其真相也，有暫屈求伸之象。"],
            ["一月缺，一鏡缺，不團圓，無可說。", "此籤不吉，月既缺鏡又損，所問諸事自屬不圓滿，恐亦無轉機。", "月缺鏡破，種種不宜，訟必反覆，婚有變易，已失者不可得，未成者無可望，占此者，惟有收心改過，實行善事，方可出而謀爲。"],
            ["車馬到臨，旌旗隱隱月分明，招安討叛，永大前程。", "此籤如問戰略戎事大吉，問事業則大發，問考試則高中。", "謀爲和合，又得貴人提攜，故前程遠大，但得意之後，尚須持盈保泰安常處，占者上上大吉。"],
            ["我何宿，我何宿，海東河北成名錄，一段神光，直沖天瀆。", "選擇努力方向，如能吸取前賢經驗，必能事半功倍，如得神助。", "成名之地，主在東北，如能所占，前往謀爲，必定喜出望外，旦爲人所尊敬，一路榮華到百頭。"],
            ["金鱗入手，得還防走，若論周旋，謹言緘口。", "金鱗影射錢財，警惕吾人謹言少語，如遇友人金錢周轉，須防上當受騙。", "一切謀爲，稱心遂意，仍須思患預防，勿少縱恣，與人交際，務當沈默寡言，勿以多言失敗，占此者須體其意而實行之。"],
            ["傾一盃，展愁眉，天地合，好思為。", "愁悶事在杯酒中盡釋，夫妻間之不合應盡快化解。", "此籤先憂後樂，無聊之際且破涕為笑，以自排遣，及天地交泰時會已至，方能展生平之懷抱，占者須好自為之，自有神力來助也。"],
            ["野鬼張弧射主人，暗中一箭鬼魂驚，忽然紅日沈江海，難破空中事不明。", "得此籤者如為主管，恐有欺害下屬之事，結果遭到致命之報復。", "小人播弄，奸佞成群，豺狼當道，安問狐狸，雖存心正直，行事坦白，亦不免受屈遭謗，占此者甯退於人後，毋出而自危。"],
            ["福星照，吉宿臨，青天有日見天真，龍飛下載到明庭。", "此籤吉利，全屬福佑德庇之讚。", "功名成遂，財利豐收，十全五福，萃於一門，是惟忠孝之家，方克獲茲善報，占之者無不利。"],
            ["獨釣寒潭，中途興闌，水寒魚不餌，空載月明還。", "不祥，所處環境欠佳，所求未如理想，反生阻礙。", "主求謀不濟，出行徒勞，求財折本，尋人口舌，占訟求人，六甲生女，婚姻不成，走失小心，交易無望，占病作禍，總之一場空。"],
            ["不歸一，勞心力，貴人旁，宜借力。", "所問諸事意見紛陳，頭緒雜亂，如不借助有力者，恐要白費心力。", "獨自經營，勞心勞力，事倍功半，須有貴人扶助，方能振起家聲，成就事業，占此者當辨而訪求之。"],
            ["雲盡月當中，光輝到處通，路途逢水順，千里快如風。", "轉機交運之兆，時下機運甚佳，所問大吉大利。", "雲散天開，清光大來，營生無不遂意，出門更宜遠行，財運亨通，人口興旺，禍去福至，先難後易之象。"],
            ["劍戟列山林，盜賊必來侵，敗走擒搜定，封侯蔭子孫。", "激烈競爭中，需料敵如神，妥為布置以待敵來，贏得勝利後尚需妥善收拾戰果。", "作事須有勇有謀，而又濟以定力，自能迅惡煞，迎吉星，前程遠大，未可限量，占此者有諫果得回味之兆。"],
            ["岸闊水深舟易落，路遙山險步難行，蛇行自有通津日，月上天空分外明。", "所問諸事宜向寬處打算，向遠途作想，最後必能成功。", "前半困苦，晚來安樂，然非曆盡艱辛，受盡折磨，必不能際會風雲，致身顯達，此非常之業，每成於非常之人。"],
            ["擬欲遷而未可遷，提防喜處惹勾連，前途若得陰人引，變化魚龍出大淵。", "勿為喜事沖昏頭，謹防歡樂引出麻煩。", "此籤人事變遷世情難測，可喜之中亦覆可懼，若有人暗中指點，始可扶搖直上，顯其身手，惹勾連戒招搖也，其垂象微矣。"],
            ["一人去，一人入，清風明月兩相猜，獲得金鱗下釣臺。", "二人合作成功前互疑，惟風度尚在，問婚姻狀況，求嗣不得而猜疑，後喜獲一女而解。", "小人道消，而後君子道長，故一去一入也。兩相猜，兩不相容也，獲鱗下臺，功成身退也，占此者於謀爲上，切勿貪戀，適可而止，庶合明哲保身之道。"],
            ["喜未穩，悲已遭，大雨狂風吹古木，人人盡道不堅牢。", "世間悲歡無常，且悲事往往比喜事嚴重，常能將人擊倒。", "得意不足喜，失意大可悲，後二句，喻事業本不可恃，更不堪蜚言之蜂起，否則有立腳不牢之虞，占此者須居安思危，免遭意外。"],
            ["可以寄百里之命，可以託六尺之孤，鍾期既遇毋遲誤。笑呼呼，他鄉聚首，各自樂康和。", "得此籤者，可望遇知音，交至友，得生死相許之配偶。", "主人有善念，天必相之。寄命托孤，何等重要，尚能毫不負人，宜康和之自樂，占此者得知已之慶，有獲福之緣。"],
            ["報道上林，春色鮮明，提鞭快著，馬上行程。", "亨通順利，時運好轉。", "勉人及鋒而試，毋自玩度歲月，果能勇敢任事，艱難赴功，佳遇只在目前，占此者知機緣之失，間不容緩，而各自策後。"],
            ["鼠入土穴，最可安身，日中不見，靜夜巡行。", "人各有其不同安身立命之所及最適當行動時機，選擇其他恐大不利。", "隱居山林，視涉迹市朝，安穩多多，日中不見，靜夜巡行，喻獨清獨醒，毋拘拘於卦，兩離之大言炎炎，以自取危亡。"],
            ["打起平生志，西南好去游，腰纏十萬貫，騎鶴上揚州。", "得此籤者，已功成名就，或者，目前從事者志趣不合，如今財力已豐，可以從已趣。", "人能勤苦，必然致富，但發迹須在西南方，否則無益，苟依所指點方向，坦然前去，他日定載金歸，占此者切勿徒執己見，故違往訓。"],
            ["喜喜喜，終防否，獲得驪龍頷下珠，忽然失卻，還在水裡。", "謹防有樂極生悲之事發生。", "否極泰來，由困而複，千里之外故人，自盡力援手，今凡百順遂，若強憂煎，是自尋苦趣。"],
            ["國有賢士，廷無佞臣，干戈不用，常享太平。", "太平盛世，家庭和樂。", "百事如意，大吉大利，營謀得志，功名神助，行人已歸，失物早還，六甲生男，婚姻成就，疾病即愈，此者必喜無疑。"],
            ["泰來否已極，諸事莫憂心，但須堷養元福，做些好事，行些方便，一點丹靈獨得真。", "示人以心性修養，積功好義之道理。", "明示時來運轉，後福無窮，然仍需積德行善，感格天心，方能持久，占此者當恪遵而實行。"],
            ["民樂業，官吏清，雍熙之世復見于今，告諸人千秋鴻業，仗此望明君。", "得籤者為首腦時，應立求屬下各安其位，各部門主管廉潔公正。", "隨遇而安，無不須遂，步步春風，想見康樂，占此者名也有，利也有，百事吉，皆成就，宜如何仰蒼天府。"],
            ["安如泰山，穩如磐石，放膽前行，中通外直。", "大吉大利。", "動作如意，謀爲稱心，吉人自有天佑，福祿永保安寧，故有泰山磐石之喻，中通外直，言人品第一也，占之吉。"],
            ["月中有丹桂，人終攀不著，雲梯足下生，此際好落腳。", "遠大目標不易實現，如有匡助之力或引荐之人，也就獲得成功機會。", "居卑思高，難如登天，幸得借助，攀附較易，占此者有因人成事之象，但亦須相與周旋，勿始賴之而終葉之也。"],
            ["天間一孤雁，嘹唳歎離群，試問知君者，而今有幾人。", "失意者之孤寂與無奈，得此籤者，宜調整處世態度，以此為誡。", "曲高和寡，落落難合，懷才莫用，淪落天涯，有扼腕之嗟，無揚眉之日，占此者還須持重，勿跋涉徒勞人世。"],
            ["紅葉無顏色，凋零一夜風，鄰雞醒午夢，心事總成空。", "好運瞬即逝，理想忽受阻礙，辦事難有成就。", "量淺福薄，費盡心機，仍是黃粱一夢，爭如安分守己，得過且過，若能幌然覺悟，看破一切，轉有益於身心，占此者宜存心忠厚，獲福亦無量。"],
            ["事如麻，理多錯，日掩雲中，空成耽擱。", "所問之事情況混亂，時運不佳，事多蹉跎，一無所成。", "有心中昏迷，全無主張之象，事理不明，任性妄爲，故處處坎坷，步步荊棘，必須小心謹慎，細理棼絲，庶可有所成就。"],
            ["勿上舊轍，甘駕新車，東西南北，穩步康衢。", "慎防勿蹈前車之覆轍，寧可改絃更張，另作他圖。", "此籤有革故鼎新，昨非今是之象，從前所如輒阻，今則一片坦途，放懷馳驟頭頭是道，占得此籤預卜苦盡甘來漸入蔗境。"],
            ["夜夢被鼠驚，醒來不見人，終宵廢寢，直到天明。", "不祥之兆，近時或有驚險之事，(可能應驗於鼠年，鼠日或屬鼠之人)，小心。", "憂患紛乘，口舌負至，官司不直，行人無信，交易失敗，六甲不安，飽受虛驚，故來惡夢，務以謹防爲是。"],
            ["秋霜肅，夏日炎，新花鮮了舊花淹，世情看冷暖，逢者不須言。", "凡事靠自己，依賴別人不可靠。", "世事盡在不言中，白雲蒼狗本奇幻。惟遠者看透炎涼之態，識破冷暖之情，占此者應有張季鷹縛魚之思，不必求謀。"],
            ["未展英雄志，馳驅不憚勞，敢將休咎卜，西北奪前標。", "不避勞苦，慎選致力方向。", "重耳複周，小白主盟，勞苦功高，天降大任，驅馳西北，發迹之地，衣錦榮歸，顧盼自喜，此英雄本色也，占此者宜效之則之。"],
            ["痾染沈沈，終日昏昏，雷門一震，體健身輕。", "如問疾病，暫難痊癒，尚需時日，以得名醫。", "此籤久困下位，意緒無聊，宛若醉生夢死，忽信傳來，即活潑潑地，若列子御風而行，占此者亦先憂後樂之兆也。"],
            ["易非易，難非難，忽地起波瀾，歡笑兩三番。", "所問之事，呈膠著狀，惟會突起變化，所有問題迎刃而解。", "非易非難，故歡笑無常，然波瀾之起，出於意外，卒之有難無易，歡即是苦，笑即是哭，事雖必成，必費盡心力。"],
            ["路不通，門閉塞，謹慎提防，雲藏月黑。", "不祥。", "絕門絕路，諸事不利，含沙射影，更防暗算，占得此者，速深居韜晦，矢志行善，庶幾災禍可解。"],
            ["蝸角蠅頭利，而今已變通，草頭人笑汝，宜始不宜終。", "貪圖小利，成不了大事，即使想通而暫不斤斤計較，恐也有始無終，舊態復萌。", "停辛寧苦，謹積得薄貨，一旦反其素行，任意浪費，宜黃金一別，永不復還，草頭人，喻言，草頭黃也，人金字上半也，合即黃金二字，占此者務崇尚節儉。"],
            ["珠玉走盤中，田園定阜豐，休言謀未遂，此去便亨通。", "努力必有代價，但須耐心等待。", "作善降祥，仁人必富，故金玉滿筐，米粟盈倉，從此不用求謀，無往而非佳境但益須孝友和睦，培植根本。"],
            ["月已明，花再發，事悠悠，無不合。", "得此籤者，所問諸事均處於最佳狀態，事事稱心如意。", "月明花發，明示興盛之象，故所求可不勞而獲，所遇皆志同道合，占此者毋庸憂慮，放瞻前行可。"],
            ["朦朧秋月映朱門，林外鳥聲遠寺僧，自有貴人來接引，何須巧語似流鶯。", "命中有貴人相助，安份守己以待機運。", "雄飛在即，不必以口才爲捷徑，醉令之美，無殊蛇足，占此者待時而動，自有佳遇，乃亨通之象。"],
            ["事未寬，心不安，疑慮久，始安然。", "所問諸事處在急於解決卻未能解決之狀況，不過最後終能渡過難關。", "有謀定後動之象，周公仰思待旦，非好名也，必通盤籌算，推敲盡善，夫而後志寧神定，占者遇事必先思維一番，方免孟浪之害。"],
            ["虛名虛位久沈沈，祿馬當求未見真，一片彩雲秋後至，去年風物一時新。", "終年碌碌營鑽，每得虛有其表之名位，但等秋後(或中年以後)將時來運轉。", "此籤言運未至無可強求也，時已交不容堅拒，秋後信來，當在一陽生時，既入順境回想從前，不免今昔之感，故末句云云占之者有上達之望。"],
            ["止止止，有終有始，似月如花，守成而已。", "成敗得失，莫不緣於因果循環之定數，不必強求。", "勸人首須知足，乃得保其始終，亦惟知足方能守其成局，月有缺圓，花有開謝，循環往復之道，占者亦如之。"],
            ["明月全圓，顏色欣然，風雲相送，和合萬年。", "大吉大利，所問諸事均得圓滿達成，更能得錦上添花之美。", "團圓和合，無憂無慮，福祿綿綿，永保無疆，占者安居樂業，可一生吃著不盡。"],
            ["寶鏡新，照兩人，心中結，合同心。", "得此籤者，即將成婚，或已成婚，雙方情投意合生活美滿，如問合夥，亦可大發。", "此爻示回心向善，坦白無私之象，開花始也，結果終也，未善始而能善終，故亦不足慮矣，占之者，幸勿以是而自餒。"],
            ["居下不親上，人心易散離，事機終失一，凡百盡成灰。", "居上者倨傲、偏狹，居下者離心，最後關鍵時刻，招致失敗。", "一子下錯，全盤俱錯，人生世上，第一在得人心，得人心多助，失人心寡助，若處世接物，昧於扼要之道，勢必至全功盡棄。占者審慎。"],
            ["兀兀塵埃久待時，幽窗寂靜有誰知，若逢青紫人相引，財利功名自可期。", "得此籤者，時運欠暢，有志未伸，須明提攜之人，前途始有望。", "潦倒半生，乏人援手，窮山坐困，難出淤泥，必須有力者出而接引，繞有希望。占者慎勿躁進，亦勿咨嗟，久久俟之，終能得好消息。"],
            ["虎伏在路途，行人莫亂呼，路旁須仔細，災禍自然無。", "遇事小心仔細，否則有招致橫禍之可能。", "戒人失足，非勸人裹足，不可誤會，兼諸事小心，效石慶之數馬，不論年災月晦，巨患奇禍，均不臨其身，寓意亦殊深遠。"],
            ["和不和，同不同，翻雲覆雨幾成空，進退須防終少功。", "不吉，如問事業，糾紛不斷，如問親情友情婚姻，則神離而貌亦不合，進退小心。", "既見絕于君子，又受憎於小人，故旅進旅退，迄無所成，此自取其咎，占此者有則改之，無則加勉，不可視爲老生常談。"],
            ["東邊事，西邊成，風物月華明，高樓弄笛聲。", "得此籤者，所謀之事於閒散自在中，不期然而有所成。", "東事西成，求彼而得此也，後二句有居高臨下，逍遙自在象，占者必須感謝上蒼，兼多行陰功以期久長。"],
            ["事團圓，物周旋，一來一往，平步青天。", "此籤大吉，所問諸事都很圓滿，得此籤者財運奇佳，本利相滾，財貨盈倉。", "處事須圓如走珠，接物須渾若用規，重交際，尚往來，人自樂親近，其平步青天，宜也，占者有所謀爲，當以圓融爲第一著。"],
            ["淺水起風波，平地生荊棘，言語慮參商，猶恐無端的。", "衰運當頭，即便慎言亦惹是非，故應少言，甚至不言。", "家庭不和，親友輕視，交無善交，有初鮮終剛愎自用，動輒齟齬，故時以無端的爲憂，占之者除戒謹恐懼外，仍須善與人同。"],
            ["秋月雲開後，薰風雨過時，若逢楚國舊知己，等閒一薦不須疑。", "如處平順之境遇，如有他鄉舊知求己引荐則可為之，否則如所求過奢者，宜多慮。", "夏秋之交，得藉至交之力，爲之先容，不費吹灰之力，遂然衣食有恃，人之相知，貴相知心，故不須疑，占之中吉。"],
            ["心已定，事何憂，金鱗已上鉤，功名一網收。", "吉祥，所問諸事，心意已決，即可達成，同時功成名就。", "瀟灑出塵之應，朱門白屋，本無一定，既已到手，何至再困林泉，無發皇氣象，占之者宜以此爲定心丸。"],
            ["意迷己不迷，事寬心不寬，要知端的信，猶隔兩重山。", "凡事未可樂觀。", "清明之中，雖無不了悟處，營求之後，大有堪憂慮處，欲知下回分解，目前猶非其時，占者只可強自抑制，到時方能了了。"],
            ["笑中生不足，內外見愁哭，雲散月光輝，轉禍當成福。", "凡事僅看表面自有不足，阻礙或能排除，禍事亦能成福庇。", "忽笑忽哭，示心中不定之象，且橫禍之至，無人不危也，一旦心事大白，自然逢凶化吉，此神明庇佑之故，占者須察微知著，以決其疑。"],
            ["簷前鵲噪正翩翩，憂慮全消喜自然，一人進了一人退，下梢還有好姻緣。", "事情已安排妥當，全無衝突，若問姻緣，即可結合。", "鵲噪連翩，報喜信也，前途進退分明，後路機緣美滿，其喜可知，占之上吉。"],
            ["荊棘生平地，風波起四方，倚欄惆悵望，無語對斜陽。", "或有煩心之事來臨，內心憂悶無人諒解。", "生於憂患，無可謀爲，滿腹躊躇，惟有寄之長空，默叩蒼窘而已，占此者百事無成，且不免有意外之變。"],
            ["謀已定，事何憂，照月上重樓，雲中客點頭。", "大局安排已定，不必多作考慮。", "青雲得路，已然亨通，月上樓，上進也，雲中客，貴人也，春意熙熙，事業增新，俱意中事，占之大吉。"],
            ["奇奇奇，地利與天時，燈花傳信後，動靜總相宜。", "所問諸事，成敗在於天時與地利。", "名利稱心，不求自得，雖由地利天時，亦緣人和以濟，動靜鹹宜，自茲進步平安吉慶，高枕無憂，占此者非徒自喜，人亦羨之。"],
            ["遇不遇，逢不逢，月沈海底，人在夢中。", "所問諸事均在虛無飄渺中。", "有壯夫失路，貧女傷春之象，後二句垂戒至深，占者切莫仍得失縈懷，憂思喪志，不如聽其自然，爲達觀也。"],
            ["暗中防霹靂，猜慮渾無實，轉眼黑雲收，擁出扶桑日。", "所耽憂之事均屬子虛烏有，很快就能真相大白。", "群小謀害，然無主名，即使申辨，亦難昭雪，幸被誣不過暫時，依然重見天日，則亦無須記恨他人，占者務須度量寬宏，勿斤斤與小人計較。"],
            ["利在中邦出戰時，一番獲餽在王庭，鳳啣丹詔歸陽畔，得享佳名四海榮。", "此籤今人問卜，不易作作妥貼解述，大意為立功異邦，歸享盛名。", "任勞任怨，須得赤心，他日實至名歸，方無慚夫清議，否則問心亦將不自安矣，占者亦取法於是。"],
            ["堪歎外邊憂，更嗟門裡鬧，意緒更牽纏，心神亦顛倒。", "不吉之兆，得此籤者處於公私紛繁，困擾重重之境。", "喪亂流離，接踵而至，內憂外患，莫可消耳，有歌哭不得，進退兩難之象，占者以得保身爲幸，"],
            ["一重山一重水，風波道坦然，壼中有別天。", "如問機構內之事，則雖風波重重，終能安然，問家務事，因婦女高妙，亦安。", "此籤歷盡崎嶇始達平陽，勞苦有之危險則未也，壺中有天自是別成一境，至此乃信跋涉之非徒勞，而終獲佳果矣，占之中吉。"],
            ["遇險不須憂，風波何足忌，若遇草頭人，咫尺青雲路。", "吉祥，化險為夷，若遇貴人，將可發跡。(貴人或可注意姓名有草字頭者)。", "首二句言些小禍患，不足憂懼，以正直無私，草頭人，指姓氏言，如葛蘇萬黃諸姓氏，遇此等姓者，概能得其力，是在各人之因緣，占之上吉。"],
            ["船棹中流急，花開春又離，事寧心不靜，惹起許多疑。", "心情紛亂，辦事慮深，時運猶待新春，旅外慎防不測，婚姻出現暗礁。", "不宜妄想，只可謹守避禍，作福修善，默契天心，失意反能得意，無望轉成有望，若徒思維猜度，是擾亂心君，占者慎之。"],
            ["可蓄可儲，片玉寸珠，停停穩穩，前遇良圖。", "不可浪費，遇良機時始能大展鴻圖。", "積德在祖宗，食報在子孫，片玉寸珠，皆功德也。後二句言諸事順遂，可操左券，毫無遊移之象，占者可預知有求必應。"],
            ["小子早趨庭，青雲久問程，貴人來助力，花謝子還成。", "早給子女適切教導，可望使其得到貴人相助，並實現願望。", "孝子獲福，出而謀爲，自有貴人相助，花落實結，喜氣盈門，占者有名利雙收之慶。"],
            ["一心兩事，一事兩心，新花枯樹，直待交春。", "得此籤者有心意不專，操之過急之毛病，未改之前難有成就。", "主時機未到，謀望難成，不必徒勞心力，懸懸諸事，一俟星回鬥轉，方有成就之期，占此者須放下心事，樂得安寧，慎勿躁進。"],
            ["大事恐難圖；殘花不再鮮。", "時機已逝，時光已老，欲圖大事，已不可能。", "景況艱難，人口欠安，凡事不能從心所欲，惟有勤加修省，心地好時，黃楊厄閏，亦許轉移，占者當以悔過爲要務，他可勿問。"],
            ["莫道事無訛，其中進退多，桂輪圓又缺，光彩更揩磨。", "好事多磨。", "讒人高張，賢士無名，榮辱升沈，顛倒位置，莫謂天道不公，須知人事靡定，月既缺矣，又滅其光，占者可以知所傲矣。"],
            ["莫歎事遲留，休言不到頭，長竿終入手，一釣上金鉤。", "有耐心、恆心，最後終能如願。", "事有危險，目前甚屬艱難，幸喜風過浪靜，終無妨礙，一朝得有憑藉，便可獲有金鱗，有開花早、結果遲之象，占之者須耐心守候。"],
            ["事稱應有忌，未為恐先躓，欲往且遲遲，還須借勢力。", "不必操之過急，須仰人相助，或有所成。", "此籤暴虎馮河有損無益，必須謹慎持重，兼得他人之助方可盡善盡美，占者幸勿鹵莽出之。"],
            ["足不安，輿不安，兩兩事相得，憂來卻又歡。", "塞翁失馬，焉知非福，有時這樣也不對，那樣也不對，合在一起卻帶來好運。", "徘徊歧路，進退兩難，兼營並騖，欣戚交並，是其無兼人之材可知，占者甯量力于事前，毋貽悔於日後。"],
            ["鼎折足，車脫輻，有貴人，重整續。", "所問諸事於開始非常不順，命中有貴人相助，事情得以重整。", "前二句爲破壞之兆，崩裂之象，忽逢大有力者，然後重整旗鼓，再造乾坤，占之者主先憂後樂，始難終易。"],
            ["參詳言語，波濤揚沸，事久無傷，時間不利。", "得此籤者，恐有訴訟，或與人訂約始終無法談攏，亦或與人長時間有口舌之辯。", "年運欠吉，諸事不利，耕作防凶年，貿易防折本，是非日有，疾病淹纏，凡事凶多吉少，禍早福遲，占者最宜審慎。"],
            ["貴客自相親，功名唾手成，獲金須積德，仰望太陽升。", "得此籤者註定顯達，但需注意積德，否則將很快失去一切。", "仁人君子，自有賢者與之契合，或推或挽，飛升在反掌之間，何以致此，積德故也，惟積德而後能日升月恒，是爲善之要可知矣，占者勉之。"],
            ["平地起波瀾，所求事日難，笑談終有忌，同心事覺歡。", "目前機運欠佳，須與知心友朋共事，庶幾無患。", "主事業沈滯，時運未濟，且有年災月晦。只可靜以候之，兼小心謹慎，欲求婚緣，須向高處，占此者速潛伏守己，以免禍害。"],
            ["狂風吹起墨雲飛，月在天心遮不得，閒時無事暫相關，到底依然無剋剝。", "所問之事或人，如天心之月，皎潔無垢，非黑雲所能遮掩。", "受人害者，終不受害，因知之者深也，若小有中傷，曾不足措意，卒之磨而不淄，初未損其毫末，自古道高毀來，望重謗至者，不知凡機，此即其象。"],
            ["人倚樓，許多愁，澹然進步，事始無憂。", "獨處深思，總覺不悅，若能眼光放遠，自然無憂。", "倚樓，獨思也，獨思則愁腸千轉矣，不若澹於世味，一切安排，付諸大造，憂慮自渙然冰釋，古人今朝有酒今朝醉，誠達觀也，占者可以思。"],
            ["一點著陽春，枯枝朵朵新，志專方遇合，切忌二三心。", "心志專一始能受到重視，略得提攜即可步入佳境。", "交友須慎，苟得良友，譬如逢春，能使枯木再生，故須專心致志的結合。他日自可得其死力，若二三其德，有初鮮終，莫怪畢生潦倒，占者宜玩味此語。"],
            ["道路迢遙，門庭閉塞，霧擁去兮，雲開見日。", "應守時待運。", "困而後亨，剝而始複，初爲雲霧所障，憂患頻仍，終乃天日重開，門路廣大，人但自求多福，不患人之不己知，占此者毋自懈，亦無自餒。"],
            ["魚上鉤，絲綸弱，收拾難，力再著。", "將得手之機會或財物，由於條件不濟，力量不足，無法承受，須再加努力。", "此籤主事非容易，須下精勤工夫，苟中道而廢，非第後路茫茫，更兼前功盡棄，占者其諦聽之。"],
            ["相引更相牽，殷勤喜自然，施為無不利，愁事轉團圓。", "得此籤者，平時樂於助人，故人際關係良好，事事均如意。", "功成名遂，凡百亨通，喜氣重重，愁思消滅，占得此者，可稱上吉。"],
            ["疑疑疑，一番笑罷一番悲，落紅滿地無人掃，獨對西風悵黛眉。", "凡猜疑之事，不可冒然嘗試，須再三思考探求真相，方作決定，免樂極生悲。", "離群索居，獨自猜疑，悲喜無常，英雄氣短，占者有群疑滿腹，衆難寒胸之象。"],
            ["上下不和同，勞而未有功，出門通大道，從此保初終。", "與其在一個意見分歧不合之團體裡，不如及早退出，另創局面。", "目下無可營爲，即勵志前進，亦莫能成就，若能出行，便可上進，占者宜出門，不宜家居。"],
            ["大事可成功，有益還無咎，雲中執鞭人，報在三秋後。", "異人指點，凡事順利，事成日在三秋後(三秋:三年，秋季三個月，或秋季第三個月。", "一帆風順，盡可放瞻前行，且有人提攜，無不成功之理，一過秋令，好音自連翩而至，占者大吉。"],
            ["桑榆催暮景，缺月恐難圓，若遇刀錐客，方知喜自然。", "事情已到窮途末路，想有轉機亦難，惟亦不必過於頹喪，能保性命即屬慶幸。", "機緣不湊，恐無佳境，必待貿易中人，與之相合，境地始見寬裕，愁而方見笑容，占者不如忍耐爲上。"],
            ["遍書前後事，艱險往來難，若得清風便，扁舟過遠山。", "所問之事頗難如願，須待天時。", "避凶趨吉，不可妄爲，始以無故而受困，終亦得便而脫險，總之禍福隨人轉移，天道初無私，占者各自審擇。"],
            ["莫歎殘花，花開枯樹，屋頭春意，喜笑嘻嘻。", "得此籤者，恐有失意事，惟轉機已現。", "此籤得意在失意之後，安樂當憂患之餘，佳運轉來，己且不料，遑論他人，占之者中吉。"],
            ["一事總成空，一事還成喜，若遇口邊人，心下堪憑委。", "凡進行之事，均屬得失互參，與人交往洽事，若得遇親信可靠之人，方可心安。", "失半得半，有失之東隅，收之桑榆之象，後二句應親友中有姓口旁者，堪托其借箸代籌，占者不必焦慮。"],
            ["欲得月中兔，須憑桃李拂，高山來接引，雙喜照雙眉。", "要得到不易到手之物，非借不凡之力。", "助己之人，轉是當年弟子，前來接引，無不盡力，故雲雙喜照雙眉，占者有因人成事，獨力無功之象。"],
            ["事遂勿憂煎，春風喜自然，更垂三尺鉤，得意獲鱗鮮。", "大吉，所問諸事均能如願，且喜事連連。", "春風得意，錦上添花，垂三尺鈎，爲善之喻言，凡勇於爲善者，事事無不如願，故雲，占者宜多積陰功，爲自己廣種福田。"],
            ["圓又缺，缺又圓，低低密密要周旋，時來始見緣。", "要求功德圓滿，但憑個人造化，機緣如何，所問諸事均如此。", "貪富遁嬗，榮枯叠換，非圓融渾脫，善與人交，雖能乘時，終無緣，占者須注意重天時人和兩項。"],
            ["乘病馬，上危坡，防失跌，見蹉跎。", "屋漏又遭連夜雨，船破偏遇當頭風，衰透至極。", "動不如靜，進不如退，安分守己，自顧不暇，是是非非，更不可管，倘不知戒，後悔莫及，占者須兢兢保守，切勿妄求非分。"],
            ["兩事已和同，輕舟遇便風，道迷人得意，歌唱急流中。", "得意勿忘形，忘形恐有災。", "有談笑定亂之象，雖道速流急，而得意歌唱，非舟輕風便，曷克臻此，占者主和光同塵，履險如夷。"],
            ["白玉蒙塵，黃金埋土，久久光輝，也須人舉。", "雖有才華卻遭埋沒，須待有心人來提拔重用。", "與人無緣，只有齟齬，故無安寧之象，乏和樂之時，占者小心提防爲是。"],
            ["上接不穩，下接不和，相纏相擾，平地風波。", "無論在團體、在家庭或社會，上下皆不相容，經年糾葛不清。", "白玉黃金，何等珍重，蒙埋塵土，瓦礫不若，然英英光輝，依然掩映，惜庸夫俗子，不見不知，一旦爲人出之，初不減其重寶，占此者，有懷才莫用，埋沒蓬蒿之象。"],
            ["背後笑嘻嘻，中行道最宜，所求終有望，不必皺雙眉。", "心中所願終可實現，何必愁眉深鎖？", "行不由徑，故外憂而內實安，事成有望，理所當然，何必苦苦疑慮，占者只管放心去做。"],
            ["憔悴無人問，林間聽杜鵑，一聲山月笛，千里淚涓涓。", "此籤指一對戀人，因雲山相阻，相思成疾，或謂，一人命運孤苦，事多傷感。", "落魄他鄉，無人救援，故一聞鳥音笛聲，輒動悲思，占此者主出行有災，兼防臥病。"],
            ["菱荷香裡受深恩，桂魄圓時印綬新，從此威名山岳重，光輝直上位絲綸。", "此籤如專就宦途而言，誠屬上上大吉，可謂官運亨通，青雲直上。", "此籤主於夏間得志，從此隆隆日上，福澤正無涯矣，占得此者大吉大利無不咸宜。"],
            ["花落正逢春，行人在半程，事成還不就，索絆兩三旬。", "任何事均不得其時，尤其最近一月內，須防有所阻礙，諸事稍慢，等待轉機。", "于夏間得志，從此隆隆日上，福澤正無涯，占得此者，大吉大利，無不鹹宜。"],
            ["欲行還止，徘徊不已，動搖莫強，得止且止。", "此籤示人，若三心二意去做一件事，出於勉強，則一動不如一靜。", "首宜謹慎，凡事色舉翔集，審度而後進退。倘操切從事，必擲珠玉於泥沙，不免自暴自棄，戒諸。"],
            ["心下事安然，周旋尚未全，逢龍還有吉，人月永團圓。", "所問諸事，雖未圓滿解決，但必能安然無虞，若遇龍(龍年或屬龍之人)自有吉兆。", "處境平順，惜尚無美滿之望，必逢辰年，或屬龍之人，或更有吉慶之事臨門，靜以俟之可也。"],
            ["夢裡說關山，波深下釣難，利名終有望，目下未開顏。", "總想換個新環境或工作，然卻卻不知如何著手，日後或有機運，目下尚不樂觀。", "此籤主胡思亂想痴人說夢，事非經過不知艱難，然亦非終老庸下也，順遂當在晚年耳，占之者盍勉之。"],
            ["三箭開雲路，營求指日成，許多閑口語，翻作笑歌聲。", "此籤屬機運亨通之籤，尤對謀事、創業者而言。", "逢凶化吉，遇難成祥，禍之適以福，故營求之事，立可成功，占者切勿因悠悠之口，自反退縮。貽誤畢生。"],
            ["休眷戀，誤前程，終鬧亂，出門庭。", "莫為意中人或原留之地戀戀不捨，而誤未來大事，不如早去為妙，免生禍亂。", "鞭策惰者，不遺餘力，惰者始而懷安，自誤前程，終且因溺於女色之故，馴至詬誶日起，憤而出外避之，則何如及早自勉，一反前之所爲。"],
            ["萬里波濤靜，一天風月閒，利名無阻隔，行路出重關。", "大吉。", "此籤有喜無憂，有得無失，名利雙收，出行安穩，尊榮安樂，無不俱備，占之大吉。"],
            ["渴望梅，饑畫餅，漫勞心，如捉影，遇虎龍，方可省。", "得此籤者，恐有幻想之習，應即改之。", "謀爲全虛，百無一得，正合勞而無功一語，必交辰寅，方能漸有轉機，此命數前定，占者可勿強求。"],
            ["事迷心不迷，事寬心不寬，一場歡喜會，不久出重關。", "單辦一項行業、活動或進行一件事，多力不從心，若有多人相助，則望可成。", "乍喜乍悲，朋從而思，目前不遇平平，不久更交鴻運，全在人好自爲之，占者唯有克已複禮，堅持到底，靜以待之。"],
            ["夜半渡無船，驚濤恐拍天，月斜雲淡處，音信有人傳。", "得此籤者，諸事不宜冒進，宜於天時、地利、人和俱備之後再行動。", "飽受虛驚，大有八公山上，草木皆兵之象，及時過境迂，方得確信，則已晚矣。月斜雲淡，魚更四躍之時，占之不吉。"],
            ["事若羈留，人不出頭，往來閉塞，要見無有。", "從事任何事，以謹慎機敏為上。", "此籤占訟不利，謀事失敗，走失難尋，出行遇險，六甲有驚，占病作祟，求財折本，遷移不吉，家宅不寧，占此者主凶，惟修德可襄之。"],
            ["萬里片帆轉，波平浪不驚，行行無阻滯，遠處更通津。", "所問諸事一向穩妥順利，日後擴展，更屬定操勝券。", "青雲得路，魚躍鳥飛，出門有功，愈遠愈妙，乃大吉之兆，占者速遠行。"],
            ["身歷驚濤，東風便好，太平身退，目下還早。", "此籤對告老退休者，頗合其解，如問他事，則屬有驚無險之局，刻下尚難抽身。", "此籤無妄之災不過暫時，一屆陽春晦星自退，從此大有可為，亦不必急流勇退，可止則止未晚也。"],
            ["鶴自雲中出，人從月下歸，新歡盈臉上，不用皺雙眉。", "吉祥，無所不利。", "雲中鶴，月下人，均有怡然世外之象，含飴鼓腹，盛世之民也，果何所憂慮而不歡樂，占之者吉。"],
            ["深潭魚可釣，幽谷鳥可羅，只用久長心，不用生疑惑。", "具有耐心，任何事均可成，不必懷疑。", "若要成，不可懈，愚公移山，誇父逐日，愚之至也，然惟大愚之人，乃有恒心，倘一遲疑，不知其可，占者須堅忍以持之，毋爲人言所誘惑。"],
            ["進不安，退不可，上下相從，明珠一顆。", "所問諸事，處於進退兩難之境，須相關諸人上下一心，始有成功之望。", "進退維谷，遊移莫決者，得失心太重，明珠一顆，誤盡蒼生，其警人貪得之心至矣，占者臨事當以義理爲重，不可患得患失。"],
            ["著著占先機，其中路不迷，目前無合意，乍免是和非。", "一向事事稱心，如今卻不再如意，但是非可免。", "手敏心靈，措置維先，更喜循依軌轍，不入歧途，目前即不甚得意，能免是非亦幸事，占此者不必灰心，自墮平生之志。"],
            ["雀噪高枝上，行人古渡頭，半途不了事，日暮轉生愁。", "眾說紛紜，莫衷一是，事情進行一半，成為日後愁苦之源。", "勸人及早圖謀，勿蹉跎歲月，至老大徒傷，詞句大有用意，占者不可誤解。"],
            ["鑿石得玉，淘沙得珠，眼前目下，何用躊躇。", "得此籤者，時運特佳，做任何事都會有意外之收穫。", "此籤平淡之中忽來絢爛，凡百喜慶均於無意中得之，真奇遇也。然畢竟心地光明者始克有之，占者須知，滿招損謙受益之義，勿忘其本來面目。"],
            ["無端風雨催春去，落盡枝頭桃李花，桃畔有人歌且笑，知君心事亂如麻。", "好景不長，好花不再，避免小人挑撥壞事，幸災樂禍。", "流離失所，傍徨無依，如喪家之犬，若涸轍之鮒，心亂如麻，情也亦勢，占者務實行忍之一字，餘無他法。"],
            ["閬苑一時春，庭前花柳新，聲傳好信息，草木盡欣欣。", "所問諸事均吉祥如意。", "謀望有成，欣然色喜，名利所在，無不遂意，一如木得春氣，有發生長養之機，占之者吉。"],
            ["門外事重疊，陰人多遇合，賢女雖助巧，渺渺終難洽。", "問卜之人處於小人當道，所負責之事又非內行，雖有賢女子相助，依然難成。", "正不勝邪，寡不離衆，家有賢婦，亦難措置裕如，此潛居隱處時也。占者須防口舌，遠奸佞，效晉之陶靖節避人爲佳。"],
            ["事有喜，面有光，終始好商量，壼中日月長。", "此籤主得賢妻，家庭和諧，生活幸福，亦主婦女有喜。", "存心好者，到處吉利，喜氣來時，自不覺歲月之長，此亦功成圓滿，方能得茲善果，占者當臨深履薄，善保其終。"],
            ["暗去有明來，憂心事可諧，終須成一笑，目下莫疑猜。", "暗去明來，明去暗來，冥冥之中自有定數。", "救人反是救己，報施不差累泰，先憂後樂，故一笑也，占者只須勉爲其難，無慮豐亨之不遂。"],
            ["寶鏡無塵染，金貂已剪裁，也逢天意合，終不惹塵埃。", "好事成雙，得此籤者，正直、高貴，受天之恩寵，事事如意。", "見光明之士，必享尊榮之報，天聽民聽，天視民視，人之所作所爲，能一一與天心相合，尚何塵垢之有，占者主大吉大利。"],
            ["和合事，笑談成，喜音在半程，平步踏青雲。", "吉，婚事笑談中說定，高升喜訊已在半途，雙喜臨門人生至樂。", "事業之成，毫不費力，鵬程有分，初非偶然，有求必應，惠迪則吉，占者有到處逢迎之象。"],
            ["花殘月缺，鏡破釵分，休來休往，事始安寧。", "大不吉祥，諸事不宜，諸對婚姻論斷，則尤不相宜，恐有勞燕分飛之虞。", "爲凶兆，家門招禍，夫妻離散，財業失敗，官司遭抑，占此者切戒比匪，或可免橫逆之來。"],
            ["門外好音來，生涯應有慶，名利有更遷，雁行終折陣。", "此籤前段昌吉喜慶，事多有成，末句寓有兄弟鬩牆之意，或兄弟中，恐有折損。", "此籤事事如意，貿易興隆近悅遠來，可保通達，然必抱鴒原之痛，占者務刻刻留念毋使不幸言而中。"],
            ["萬里好江山，風沙盡日間，已吞鉤上餌，何必遇波瀾。", "變起倉悴，即將達成之希望亦被預料不到之狀況破壞無遺。", "既入佳境，必不致有挫跌之虞，然仍當記憶體善心，外行善事，以保永久，失意時占之極驗。"],
            ["雙燕啣書舞，指日一齊來，寂寞淹留客，從茲下釣臺。", "所期盼之事或人，已指日可待。", "此籤有出幽谷遷喬木之象，雙燕銜書喜信至也，太公投竿而為尚父，子凌去磯而為帝師，即後二句意占之者主有風雲際會之望。"],
            ["望去幾重山，高深漸可攀，舉頭天上看，明月在人間。", "所問諸事看似高深莫測，只要不畏懼，終有明白一天。", "似難實易，只須實力做去，不愁無從攀折，天上明月，乃出人間，可知苦行之人，必不徒勞，占者務體此意，躬行實踐以策後效。"],
            ["用之則行，舍之則藏，一騎出重關，佳音咫尺間。", "用人應用有志節及才幹之人，並放手讓他施展，很快即有成就。", "進退出入雖由前定，然出關而佳音至，是遠行之利己也，男子志在四方，占者切勿戀家。"],
            ["積德施功有子孫，榖牛祭神及西鄰，功名兩字成全日，回首山河萬物新。", "行善積德，澤被鄉里，將來必有好報。", "明言一旦得志，人皆刮目相看，視昔受人奚落時，天淵相判，殺牛祭神，謝天之義，占者當知余慶全在積善德，否則難成全。"],
            ["安坦路平夷，雲中一雁飛，桃花逢驟雨，水畔女頻啼。", "此籤若對男女間相戀、婚姻、結褵等，恐屬大不利，如問他事，亦波折重重。", "首句平安，次句兄弟拆散，三句妻室喪亡，末句主被水災，禍患臨頭，夢想不到，占者速自修省。"],
            ["門內起干戈，親仇兩不和，朱衣臨日月，始覺笑呵呵。", "謹防家人失和，手足互殘，並防身邊親人成仇家，小心翼翼，終可有成。", "家庭不睦，兄弟鬩牆，夫妻反目，皆以己貧賤故，一旦朱衣點頭，博得功名，衣錦還鄉，家人乃笑顔相向，占者勿怪人情勢利，自勉焉而已。"],
            ["有一人，獲一鹿，事團圓，門外索。", "所問事必成，但須防後患，如得財富將有人強分，得配偶則第三者糾纆不放。", "鹿者，祿也，人能獲祿，何事不可團圓，門庭如市之象也，占者中吉。"],
            ["汝往無攸利，花開又及秋，嚴霜物薦至，退步不存留。", "不祥。", "主出不利，諸事不順，交易折本，家業凋零，作速退守，尚恐不保，妄意進行，更生不測，占者戒之。"],
            ["新月為鉤，清風作線，舉網煙波，錦鱗易見。", "佳，凡事得心應手，左右逢源。", "月鉤風線君子而隱於漁者也，舉網煙波錦鱗易見，隨遇而安也，占此者宜退居，不利見大人。"],
            ["先關鎖，續提防，小節不知戒，因循成大殃。", "因小失大，不怕一萬，只怕萬一，星星之火，亦可燎原。", "曰關鎖，使人緘口也，曰提防，恐人失足也，不謹細行，終累大德，後二句之注，占者須身體而力行之。"],
            ["燕語鶯啼，花開滿院，倚欄春睡覺，無語歛愁顏。", "時運已轉，凡事可以順利進行無阻。", "境地平常，安享自然，盡可自樂其樂，莫管閑是閑非，若能積德累仁，興盛之兆，占者須守知止不辱之語。"],
            ["勞心勞心，勞心有成，清風借力，歡笑前程。", "隨時留心、深思，自必於事有補，前途開朗。", "言心不徒勞，事無不濟，能得人力吹拂，自然獲福無涯，占者果能不辭勞瘁。皇天必不負苦心人。"],
            ["進步且徘徊，春風柳絮吹，水邊行客倦，枕畔有憂懷。", "凡事求其循序漸進足矣，往往事將有成時又遭外來因素之阻擾。", "吉中有凶，命運未通，蜀道難行，舟中敵國，又有遊移莫決，飄泊無定之象，占者務十分留意。"],
            ["玉石猶終昧，那堪小悔多，終無咎，笑呵呵。", "所問諸事由於當事人之昏昧，小錯很多，但並無大礙。", "目下常有小悔，故蘊玉之石，晦而不彰，但久後可保無咎，故終笑逐顔開，占者處之以鎮定，應之以從容，可不煩思慮。"],
            ["垂翼遙天去，皆因避難行，一途經濟意，又是滿園春。", "狼狽脫逃一時，免卻一場災禍，在經過一番折騰後，終將回到安適生活中。", "知難而退之象，但不久仍見用於世，故園春色也，不減當年，受其賜者，若登春台，占者主當大任，特殊非易易。"],
            ["佳信至，開笑顏，飛騰一去，撥雲上天。", "大吉大利之上上籤，已有喜訊佳音，機運一到，即可平步青雲，直上九重。", "困而將通，喜信旦夕便至，畫龍點睛，行見破壁飛去，其勝達可知，占之大吉。"],
            ["青氈空守舊，枝上巢生風，莫為一時喜，還疑此象凶。", "不祥，應加謹防，困窘之境依舊，且有風雨飄搖之險。", "守株待兔，了無佳趣，鷦鷯一枝，遇風飄搖，切莫沾沾自喜，恐遭覆巢之厄，占者當時時警惕，刻刻提防，爲未雨綢繆之計。"],
            ["莫言荊棘惡，終為鸞鳳棲，目前應有待，何用早躊躇。", "雖有阻礙，終將鸞鳳合鳴，如問他事，則亦好事多磨，但終將如願。", "暫時安分，後此漸有機緣，不求自至，切勿因近年謀爲不遂，常自嗟歎，人事有得失、命運有否泰，目前不過少待，占者還應自喜。"],
            ["上下和，憂愁決，千嶂雲，一輪月。", "家和萬事興。", "和則無憂，訣之爲言訣也，與人訣別也，雲還於岫，月明於空，廊清翳障獨顯皎潔之義，占者須實行人和兩字。"],
            ["玉出崑岡石，舟離古渡灘，行藏終有望，用舍不為難。", "某事或某人之底細即可水落石出，做抉擇不會有困難。", "行藏總由天定，用舍不關人爲，可進則進，當止則止，首二句正是此意，占者一切須聽自然，切莫強求，不然，昆崗俱焚，載胥及溺。"],
            ["目下意難舒，有客來徐徐，金車雖歷險，吝必有終與。", "閣下心事糾結不開，待客訪友遲延難遇，日後處境將留悵恨。", "現在光景雖佳，將來遂須曆盡辛勤，客來徐徐，將有待也，吝必終與，謂鄙夫也，占者主先逸後勞，不能一生得意。"],
            ["可以寄，可以託，事遲遲，無舛錯。", "所問之事可以託付他人去辦，不過進行緩慢，好在尚不至出錯。", "主人有善念，天必相之。寄命托孤，何等重要，尚能毫不負人，宜康和之自樂，占此者得知已之慶，有獲福之緣。"],
            ["恐懼憂煎，皆在目前，若逢明鑑，指破空傳。", "所問諸事憂患深重，若得人指點迷津，或可化險為夷。", "道途驚險，小人侵害，禍近眉睫，不同泛泛，幸善良之人，遇凶不凶，遇險不險，明鏡一照，真相畢露，此吉人天相之兆，占者須益勉之。"],
            ["月掩雲間，昏迷道路，雲散月明，漸宜進步。", "所問之事一時遭遇困阻，不辨路徑，須排除障礙後，則再行進展可也。", "現方困厄，寸步難行，必俟災星退盡，始漸明顯，得步進步，可無妨礙，占者只可藏器待時，勿魯莽遽進。"],
            ["道路狂招呼，風波一點無，時乖心緒亂，全仗貴人扶。", "一切條件對已有利，亦無風險，奈合時運見拙而心煩意亂，唯有待貴人援手。", "有東馳西突，陸地行舟之象，時既不順，心又紛亂，謀望豈能有成，惟貴人出而扶持，庶免傾覆之慮，占者亟宜自戒。"],
            ["臨淵放鉤，清絕點埃，巨鰲隨得，不用疑猜。", "要致富須走險路，做了抉擇之後就應耐心以待，不必患得患失。", "得手應心，速而且易，諸事順遂，當得美報，雖得之意外，實早在數中，占之上吉。"],
            ["無中應有直，心事還成戚，雲散月重圓，千里風帆急。", "平平，示人須以「浮雲散，明月照人來」之心情，進行心中之事。", "喜而非喜，常常擔憂，必缺而再圓，離而複合，乃身入勝境，故雲千里風帆急，占之中吉。"],
            ["造化生來信自然，師征千里福綿綿，功名得就神明助，蛇兔相逢定變遷。", "大吉，人生有些際遇必靠福份及神佑，事情只要含有蛇、兔因素，必有變遷。", "功名富貴，冥冥中實司其柄，有神明爲之扶助，不患不福祿綿綿，但防蛇與兔相逢，占者能默求神佑，則吉。"],
            ["大仗神威，群魔消滅，滅了又須威，神威亦極力，牢牢記取，免致久後失跌。", "援引外力助達目的後，要對外力有適當控制，以免外力從此將已束縛，如舉債。", "全仗神威佛力，方能將群魔消滅，以後仍須廣行陰功，庶可感格神明，始終庇護，如果自怡，久必失足，不可救藥，占之者可不慎歡。"],
            ["道必堅心，堅心必道成，建功勳，早回程，造茅庵，修真身，一日飛昇，仙班列名。", "勉人立身修業，勿圖官宦之奢望，勿為功祿所貪戀。", "凡事營求，必須具有根基，方能成大事，建大功，事功既成，便須急流勇退，隱居山林，不問世事，以保其身，此君子之出處也。"],
            ["一念上天堂，一念入地獄，地獄天堂，便分榮辱，自立念頭要真，不可隨人碌碌。", "榮耀或羞辱取決人之一念之間，人云亦云，昏庸一生豈不可惜？", "此籤一切須自己主張，切莫聽旁人讒言，以至榮辱不分，依違兩可，墜茵墜涵一念之差，占者能立定方針，庶幾庸中佼佼矣。"],
            ["羊逸群，日對民，逢牛口，便咬人，一個君一個臣，君臣有些驚，須仗真神拯救蒼生。", "所顯詩句近乎玄虛，不適用現代，不妨再卜一籤。", "六畜多災，牧人受驚，農家占此，爲害匪細，幸疫病一時即退，家家始得安樂。"],
            ["若是有緣人，一指便回首，執迷不悟者，屢引也不走。", "所問事已步入歧途，是否及時省悟回頭，視問卜者是否有緣及個性是否執拗。", "言人之迷悟，在與人有緣無緣，一失中成千古恨，再回頭是百年身，故覺悟須早，遲則不及，占者得此點指，其速警醒。"],
            ["月兒升東，清光可挹，萬里無雲，海天一碧。", "有好機運來，可以大放異彩，凡事均無阻塞，今後環境更趨有利。", "此籤青雲得路，中有奇遇，百事如意無往不利，天佑善人，合當如是，占之者吉。"],
            ["男兒若得封侯印，不負人間走一遭，功成身退煙霞嘯傲，脫卻紫羅袍，方是男兒道。", "大功告成之後，自可封侯或退隱山林，而選擇後者才是大丈夫行徑。", "前程遠大，急須奮發有爲，早出早歸，得以優遊林下，得盡人間之福，占者有後生可畏之象，然切勿自作聰明，誤爲進銳而速而忽之。"],
            ["心月狐狸，迷惑世人，世人不察，延久傾身。", "世間有若干危害人體之嗜好，智者應以「妖狐」迷人為鑑。", "奸邪迷惑，最工孤媚，甘言誘人，適投所好，卒乃身受其害，猶不自悟，占此者毋暱小人，毋近妖婦，群邪絕迹，讒言不聞，則自無喪身之虞矣。"],
            ["驀地狂風起，大樹盡掀揚，枝葉未凋零，培植終無恙。", "有驚無險。", "橫逆之來，出於意外，驚魂喪魄，幾頻于危，幸根本未搖，所損枝葉，略加培植，依然生氣勃勃，占此者有履險如夷，轉危爲安之兆。"],
            ["虛日旺相，法要推尋，四圍旋繞，對敵沖營。", "勿為假相所欺，應多方深入探討真相。", "生克之道，陰陽家可以推求，譬如用兵，搗其中堅，其圓自解，占者遇得此者，須以巧智取勝，毋徒自困。"],
            ["榮枯早定莫嗟傷，辛苦他邦安享家鄉，為他人作嫁衣裳，今日君嘗，他年改調別人嘗。", "榮枯天定，不要為失意傷情，應樂天知命，得此籤者恐刻下時運不佳。", "作客他鄉，勞碌一世，方能坐食田園，熙熙攘攘，古今同慨，正不徒一二人勞苦，占者可由是洞見真理，處之泰然矣。"],
            ["女兒大，喜臨門，嫁良人，添子孫，同拜受，感皇恩。", "吉祥，對兒女婚嫁、男女友誼、家室人丁等，更為稱慶。", "種瓜得瓜，種豆得豆，女大必嫁良人，可知勤苦必獲衣食，果能勉爲善人，何患無良好之結果，占者盍亦勉諸。"],
            ["木生火，口不噤，瘋癲作症，寒熱相侵。", "大不利，應謹言慎行，以防不測，免遭橫事，此籤於人為病痛，於事亦然。", "內憂外患，交伴而至，譬如患病，肝木既旺，瘋癲以起，心火又熾，寒熱以作，實群醫束手時，占之者凶。"],
            ["休休休，過了三年又六週，不猛省，禍到頭。", "在近三年半左右，儘量減少興革異動，對過去所為加以反省，如此或可避禍。", "災晦將臨，諸事不宜，必須經過三年半，方有謀爲之望，否則定有不測之險，凜之凜之，六周，六個月。"],
            ["檻欄起火，孽畜遭殃，預防得力，滅火成康。", "凡事先防範於未然，才能安全無慮。", "此籤火起欄杆殃及孽畜，看似不妨然苟非預防得力，勢必延及全宅，焚及家口，占者務謹小慎微，勿使禍之所至，滋蔓難圖，則庶乎其可也。"],
            ["已遂心頭願，始知志氣伸，三山須把握，頻頻定太平。", "事情辦成後，仍應持謹慎戒懼之心，否則恐出差錯，使前功盡棄。", "合家安泰，名利雙收，好事成喜，求謀有緣，出行大吉，婚姻必成，占此者安然享受，不費猜疑。"],
            ["福星照映，桂子香聞，滿天星斗，光耀逼人。", "大吉大利，命中註定有神明護佑，逢秋八月或有貴人相助。", "功名成遂，財利豐收，十全五福，萃於一門，是惟忠孝之家，方克獲茲善報，占之者無不利。"],
            ["東南北將來成故墟，燕薊地蒼生無存濟，若要大奮雄心，水源不知何處？", "環境至為險惡，既有近憂，又有遠患，如想絕地求生，應先求取活命水源。", "大難將至，劫數難逃，東南北三方，均無安身之所，惟西土平靜，前去尚可有爲，惜不免永客異鄉，占此者須急速料量，勿延勿遲。"],
            ["何事漫躊躇，死有日，生有時，何事慢躊躇，飄然一往，心上無疑。", "人生一切莫不有定數，對事不必過於計較。", "死生有命，富貴在天，事到臨頭，懸崖撒手，豈不直截了當，此即死裏求生法，占者得此，大可以養其浩然之氣。"],
            ["旭日正當空，光輝宇宙中，漢家火盛德，進退自從容。", "", "祖宗積德之盛，故此時隆隆日上，方興未艾，正如火性炎上，萬無就下之理，末句有與人無忤，與世無驚之象，占者必定順適。"],
            ["往來行僻處，猝然著一驚，豺狼若當道，斬滅方稱心。", "進行之事突遇兇險，須拿勇氣排除，事情方可順利，得此籤者恐有受驚嚇之事。", "尋柳問花，躬行非義，驚懼故倏然而來，然沒遇欺詐虐者，久必剪除之而後快，是仍不失爲豪俠也，區區虛驚，雖受無傷。"],
            ["八門分八位，九星布九方，青赤黃白黑，五色卷錦裝，交鋒對壘，兩兩相當。", "此籤恐係諸葛當年用兵制敵之策略，所卜之事可能雙方實力相當。", "勾心鬥角，煞費心機，失諸毫釐，差之千里，欲求戰勝，非勢均力敵不可，占者切勿輕心掉之。"],
            ["終身不習上，在世卻枉然，輪迴不能免，永落深坑塹。", "勸人不能昏瞶渡日。", "有力爭上游，惡居下流之象，後二句警人尤深，坑塹地獄也，占之者速宜回頭猛省，以此語爲座右銘。"],
            ["兩個子女，同到齊行，陰陽和合，謀作歡欣。", "得此籤者可望得一子一女，亦可能一舉得男女各一之雙胞胎，凡事求陰陽調和。", "夫賢妻良，琴瑟和諧，通力合作，鼓舞歡欣，雖南面王不易，占之者無悔吝。"],
            ["中有玄機賦，雞鳴方顯露，猛然悟禪關，打破君門路。", "所問諸事疑難未解，但很快就能悟出解決之道。", "始雖執迷，終能醒悟，放下屠刀，立地成佛，改頭換面，判若兩人，占此者亟宜三複斯言，毋見機而不作。"],
            ["數尾金魚吞餌，絲竿釣了回頭，家食翻嫌太貴，五湖四海遨遊。", "意外之好運，有時不是福氣反成負擔。", "家食不吉，出外糊口，五湖四海，言不必局於一隅，占者亦利出行，則衣食寬裕多矣。"],
            ["卯日兒出林，午時正福臨，卯生於寅，方見天心。", "天時依一定順序運轉，做任何事不能違背自然法則。", "逢卯年方能出頭，交午年福星照臨，卯生於寅，謂先寅而後卯也，天心如是，不用強求，占者何必加以人謀。"],
            ["日中不決，日到方明，一場好事，六耳同成。", "所問事一兩日內尚難定，日子到了事情自明朗，應為三個人合力辦成之好事。", "事前不能預斷，時至方有分曉，好事多磨，以耳爲目，占此者有坐失機會之象。"],
            ["狐宿是妖星，猿猴及樹精，入山遇此曜，迷了性和心。", "此籤示人：孤獨易於受惑。", "此籤主群陰播弄淆亂心，故交友不可不慎，立意不可不定，斷事不可不快，悟性不可不佳，占者終以遠之為是。"],
            ["滴漏聲催雞唱，趲行人逐隊放，晚渡關津，前程無量。", "全力以赴，必有所成。", "有勸人快快走之象，祖逖著鞭，班超投筆，子胥過昭關，宗懿乘長風，無非不失時耳，後皆顯貴，得志一時，占者慎勿自甘暴棄，遂青雲之志馬。"],
            ["人在天涯外，久乏信音來，家人頻望眼，草木暢胸懷。", "所念之人，遠在他鄉，久無訊息，對其懷念殷切。", "行人出外，杳無消息，家人雖望眼將穿，遊子乃溺情花柳，誠不肖之尤者，占者可去函切貴之，倘系本人求得此者，則作速改悔，勿再野遊。"],
            ["這顆樹下，一穴生成，若遷此土，福祿駢臻。", "寓意有二:凡命運亨通者，即或居於枯樹古井旁，福澤依增勿營華屋。", "樹下有穴惟具慧眼者能辨之，常人不能也。遷居其處宜福祿之駢臻矣，占者只須自修，不患無佳地也。"],
            ["躬耕隴畝，形神似勞，無拘無繫，其樂陶陶。", "過不求人之生活，身體雖勞，精神卻愉快。", "顯達不如伏處之安閒，小民以耕以食，無衣冠之束縛，宜陶淵明不肯爲五鬥米折腰也，占者盡亦賦歸去來群。"],
            ["禍來見鬼，鬼病淹纏，金羊得路，身脫災殃。", "大禍臨頭，心被鬼怪的病淹沒而糾纏不放，除非有「金、羊」有關事物來救。", "占病不利，鬼邪爲崇，至乙未年自然脫離災殃，諸事漸漸順手，金羊，乙未也，占者遇此，不必妄用醫藥，待時而已。"],
            ["急起行，急起行，前途去，結同盟，隻手擎天柱，史冊好標名。", "得此籤者可能於倉猝間受命，代表所屬協調重大事務，並獲圓滿成功。", "其始必倚賴衆力，方可有成，四民占之，均有出類拔萃之慶，故能災過尋常。"],
            ["深山據猛虎，虎嘯出山窩，揚威抖擻，何怕人多。", "雄壯威嚴，果敢勇往始可折服眾人。", "不出則已，一出驚人，有此威名，何戰不勝，何攻不克，占之者宜出而問世。"],
            ["三天門，四地戶，布陣成，明聚路，軍馬齊奔，鳴鼓進步。", "吾人行事，宜先制定良策，方可致勝可能。", "作事須智勇兼備，然後退可以守，進可以戰，占之者務臨事而懼，好謀而成。"],
            ["山山山，山上建茅菴，不比人間棟宇，卻如天上雲曇。", "知足常樂。", "人棄我取，人濁我清，自甘恬淡，惱怒繁華，真世外人也，占之者必隱君子無疑。"],
            ["來去原無定處，時來時去安身，跋涉無慮，榮辱不計。", "得此籤者一生勞碌，謀生之處屢易，好在住宿有著落，奔波途中亦安全。", "天地逆旅，隨遇而安，滿面風塵，不以爲意，如膝墜淵，視若黛來，非達人大觀，必不致此，占此者速師。"],
            ["有子長，成水局，時遇火反發福，不必過憂煎，人心苦不足。", "世事難以盡如人意，不是太過就是不及，為此傷神憂慮，毫無意義。", "水火既濟，頗有福澤，惟得隴望蜀，人情大抵皆然，故苦心焦慮，多不知足，占者切勿如是，安分守已爲貴。"],
            ["黑夜裡，勿前往，一有值，要著慌，牢牢記，須結黨。", "陌生環境未了解前，勿冒然前往，如果必須前往，應結伴而行。", "此籤二人同心其利斷金，三人同行必有我師，眾擎易舉孤掌難鳴即此義也，其用意深遠矣，占此者可不知所務歟？"],
            ["蟄龍已出世，頭角首生成，雲興雨澤，得濟蒼生。", "大吉大利，所問之事，困局即將突破，從此可入坦途。", "不日出山，匡濟時艱，如出仕則廣被恩澤，行商則小民利賴，行善則人受其賜皆是，占之吉。"],
            ["火勢薰天，天邊盡赤，遇際水源，庶乎成格。", "一旦發生意外災禍，事發就不可收拾，應有克制對策，庶幾解除困難。", "此籤有水火既濟之象，若有火無水未免偏廢，占者須知調劑之道。"],
            ["向南有大道，乘馬入杭城，不知吳人唱，更有一知音。", "含下列寓意：工作地點以南方為宜，尋訪可能得遇，交遊雖不廣，可獲知己。", "知音之少，兼覺不易，占之者切莫濫交，更勿誤入歧途，爲盛德之累。"],
            ["有田一畝，儘可耕耘，無窮收獲，都在西成。", "家有恆產，雖說不多，若能認真經營終必有成。得此籤者似不易離家另謀他業。", "出身雖微，勝於坐食，若能勤懇，秋收必豐，凡百事業，小就亦有佳處，不可以其小而忽之，占者試思。"],
            ["勿嫌兒無唇，疾足追不及，納入猿穴中，走狗何處覓。", "此籤寓意難明，或指形貌才智雖有缺陷，但天生萬物，必有所長。", "首二句，謂一言既出，駟馬難追。後二句，謂金人緘口，所以寡尤，占者務以慎言爲是。"],
            ["六牛耕地，墾開無疆，收成結實，盈稟盈倉。", "一分耕耘，一分收獲，天下無僥倖而成之事。", "能下死工夫，便有好收成，從前血汗，悉變金錢，前因後果，如是如是，占之者其勉勵。"],
            ["大奮沖天志，勿苦戀家鄉，七八君行早，揚武在沙場。", "成大事者應志在四方，勿囿於一角，把握時機及早行動(七八或與時日機運有關)。", "男子志在四方，冒險前進，自有益處，七八君行早，利於七八月出行也，揚武在沙場，其地名有一沙字者爲佳。"],
            ["葵花向日，忠赤傾心，大開廣廈，樂享太平。", "得此籤者深受部屬愛戴，都能為其赤誠工作，使其事業鴻圖大展。", "有傾心主人，東南盡美之象，我忠於主人，主人自必愛於我，報施之道，大開廣廈，居停之樂可知。"],
            ["人不識仙，那有真訣，一入玄門，津津有益。", "進行一事，必先窮理探源，把握其中要領，方能得心應手。", "從前不知，一向糊塗錯過，今既明白，豈肯輕易放過，實寓此意，占之者須作速醒悟。"],
            ["勿謂說話太沈，泥了就不成真，悟出千般奧妙，方識仙道最神。", "所問之事，面貌並不清朗，須用心去探求其內蘊。", "識時在於觸妙，察理在於得實，神仙點化，在有意無意之間，占之者細心參悟，庶機得之。"],
            ["功名雖多實際，何如修煉成真，真身不朽，萬載長春。", "與其汲汲於追求功名，不如修身養性。", "人爵雖貴，似實而虛，興得人爵，寧得天爵，占者務拿定主意，自選擇之，毋徒熱中。"],
            ["走走走，遇一狗，急思尋，可長久。", "處理事情上不宜忽略小節，要特別注意突生之狀況，並推想其緣由方可無事。", "見兔顧犬，已嫌遲遲，及早籌思，方可弭患迎祥，生計永久，占者遇事，切莫遲疑不決。"],
            ["不知真消息，消息驀地來，月圓月缺夜，不許把門開。", "來得倉促之消息，不可輕信，變化焂忽或反覆無常事情，少管為妙。", "消息雖有，卻須預防，得意固宜防失意，失意更宜防橫禍，總之一世爲人，無日不當在恐懼中。"],
            ["火旺處要不疲，水深處要不呆，到頭當酌量，毋得惹他災。", "事情進行到最重要關頭應慎思斟酌，方不致帶來災害。", "沈機觀變，因地制宜，全在操縱得法，不能拘守成規，所以然者免是非，占者須博學慎思明辨篤行。"],
            ["賓雁遶湖地成陸，行建功勳早回程，貪戀終非世人福，莫教雞鶩會相爭。", "見好就收。", "此籤主功成身退，勿再插身名利場中，致求榮而辱，為樂而興悲，占者當明出處之道。"],
            ["天上風，天邊月，月白風清，兩兩相當。", "時運正佳，故凡求職、求偶、求學、求財等均有吉利。", "清清白白，無愧無怍，與人自有相得之慶，若一味昏濁，人皆望望然去之矣，占者須以光明正大，爲立身之根基。"],
            ["葉歸根，長立天地，水清源長流河海，人得金丹長生淵涯。", "萬物生長、代謝均循一定之自然趨勢，人類亦然，能悟其理，自必長壽無災。", "戒人須知根源，勿忘受生之道，必得金丹，乃可長生，金丹何在，在於本身攝食二字，占者其亦肯清心寡欲乎。"],
            ["乘馬去長安，看花花正發，一日雨來淋，香色盡凋零。", "花無百日嬌，無千日好，得意常想失意時，諸般順心時，應防突來失意或災殃。", "甫經得意，遂而墮落，由驕盈故也，若持盈保泰，必不然矣，占者宜以是語作當頭一棒。"],
            ["木長春天根幹老，子實三秋枝葉凋，不凋不謝，不見根牢。", "先經挫折磨練，然後其生命力必更堅強。", "多經歷練，方見盤根錯節，不愛雨風摧殘，幹老葉凋，閱世深沈，占者得之，是患難中人。"],
            ["叫道叫道，天將明了，何不伸首舒眉，反做蓬蒿到老。", "早起三光，晏起三荒，應及時努力，遇事不可因循不振。", "時機既至，便當拔劍而起舞，出而建功立業，老馬伏櫪，正是不必，占者貴能乘時。"],
            ["藥餌真，服了寧，三劑後，足分明，神中神，清中清，固得緊，可長生。", "任何事物，真即真假即假，一經多方考驗，底細便明。", "事業不貴多而貴精，專精一業，便可謀生，且神清氣爽，心閑身安，彼兼營並騖者，可以此爲鏗。"],
            ["三天曾結社，四海盡知名，長騎駿馬，直入天庭。", "大吉大利，凡事左右逢源，得心應手。", "邂逅相逢，一見如故，傾心吐膽，古道照人，占者能于無意中獲交良友。"],
            ["閒來夫子處，偶然遇一人，童顏鶴髮，笑裡生春。", "命中有吉人相助。", "此籤主邂逅相逢，一見如故，傾心吐膽，古道照人，占者能於無意中獲交良友。"],
            ["閒雲野鶴望東行，惟有鄉人便是知音，經營佈置兩三春，聯街燈火後，錦帆前程。", "悠閒自在態度追求理想者，際遇最佳，經過二三年之經營，即可有成。", "此籤作客東土，得遇同里，遂結知心，相與謀為，煞費苦心，迨過上元，遂交鴻運，占者如欲有所營求，非藉鄉人不可。"],
            ["漢水無情，蜀水澄清，黃河滾滾，四處煙塵。", "濁者自濁，清者自清，吾人須潔身自好，以處混亂之險惡世道。", "楚豫不寧，靡可棲止，惟川中安堵如故，占者如有親友羈旅楚豫，音信必然阻隔。"],
            ["潛龍已受困，尚不見雲興，佇看雲四合，飛去到天庭。", "求籤者暫遇挫折，目前尚在守時待運階段，待時機成熟。", "功名沈滯，時運未濟，雖志圖沖舉，而風雲未起，除非勤求力學，庶乎發迹有自，沾者切勿性急。"],
            ["此處滋味濃，濃艷不耐久，何如談笑生風，倒好東奔西走。", "好花不常開，一旦處於絕佳之境，宜淡然處之，並另謀良圖。", "待人接物，切莫過於認真，得讓處且讓，得忍處且忍，開口大笑，出外秘訣，占者切記切記。"],
            ["這裡有小人，切莫稍留停，忙打點，好起行，日月如逝勿久存。", "所問諸事可能受到小人干擾破壞，與其爭論無益，避之則吉。", "此籤迴避小人，當如蛇蝎，況彼眾我寡，去如不速，禍即踵至。故既言莫稍留，又云勿久存也。占者見機而作不俟終日。"],
            ["龍生頭角，將沛甘霖，六七八早，好濟蒼生。", "感應籤，求職謀事創業等，遇龍年生者可得其助，遷居進宅等，逢678之日期較順。", "暫時安寧，好音即來，不出六七八三月中，定有亨通之望，占之者宜欣喜勿憂疑。"],
            ["太白現西南，龍蛇相競逐，龍自飛上天，蛇卻被刑戮。", "此籤示人：善惡終有報。", "正不勝邪，理不勝數，一生一死，天道昭然，占之者正不必強自紛爭。"],
            ["曾把樹栽，也要待春來，東風嫋嫋，開遍花街。", "寓意有二：一分耕耘，一分收獲，已為某事勞心盡力，但須待時機及人助方有成。", "事有阻滯，待開春方能順手，以後得步進步，極其絢爛，占者只須順時。"],
            ["四十餘年苦已深，而今汝樂度光陰，莫籌論，恩愛尚多歡喜事，惜甚青春，不減青春。", "此籤勸人要能知足，並把握光陰享受人生。", "苦盡甘來，晚福殊佳，老當益壯，足以自娛，占者自家明白，不能多瀆。"],
            ["三冬足，文藝精，到頭處，亦成冰，急急回首，勿誤前程。", "所問諸事做法上恐有問題，應即改弦更張另作安排。", "讀書不成，不如改習他業，免至貽誤終身，然亦須趁早，遲則亦不及也，占之者速改圖。"],
            ["奇怪奇怪，前番來了，今番又來，謹慎提防，勿被弄壞。", "所問之事情況怪異，應提防生變，以免壞了大事。", "禍不單行，一再挫折，苟非防如虎狼，鮮不又遭其殘害者，占之者必嚴密防範，其難其慎而後可。"],
            ["耕牛伏軏，闢土開疆，坐看收穫，黍稷稻梁。", "得此籤者有以逸待勞，坐享其成之機運。", "惰爲貧之母，勤爲富之源，古未有惰而能富者，亦未有勤而終貧者，占之者欲求富，先務勤。"],
            ["腰下佩青萍，步入金鑾殿，覆護三山，千錘百鍊。", "得此籤者功勳卓著，必為行業中頂尖人物，所問諸事無不卓然有成。", "火候既到，大丹自成，凡事非一蹴可機，其通顯者必有所自也，占者勿徒抱向隅之憾。"],
            ["雛鳥飛高，出谷遷喬，龍神牙爪，變化海島。", "此籤以雛鳥喻人學藝未精不知天高地厚，初入社會難免飽受波濤翻滾之苦。", "有自卑登高，變化不測之象，等機遇之來，有非人力所能拒者，占者大吉。"],
            ["吉吉吉，尋常一樣窗前月，凶凶凶，有了梅花便不同，含笑向東風，人情不比舊時濃。", "得此籤者恐有不吉事情臨頭，並因而嚐到人情淡薄之滋味。", "說吉不吉，還是尋常，說凶不凶，幾曾遭禍，勘透世情，付之一笑，最是利落，占者宜牢守此語。"],
            ["大火炎炎，宜水相濟，寶鼎丹成，掀天揭地。", "不經意引發之災難總有剋制之法，刻意策劃之事端，往往一發不可收拾。", "人無我不立，我無人不成，人我相扶,宛如水火既濟，及瓜熟蒂落，自然與衆不同，占者當以金交友爲第一義。"],
            ["鐵索一條，未把孤舟繫，金刀一下，早把頭落地。", "所問之事宜以快刀斬亂麻方式處理，以杜後患。", "始有飄搖之危，終來斷絕之險，從前種種，大夢一場，占者亦惟有修省以解免之。"],
            ["十二時中，緊急煉著，一刻少延，無處下腳。", "做任何事，均要抱著積極態度不懈不怠全力以赴，若稍有停頓，將難以收拾。", "有一息尚存，不容少懈之象。大禹惜寸陰，我輩當惜寸陰，占者急須奮勉。"],
            ["風起西南，紅日當天，奇門妙訣，一掌能著。", "當時機成熟，謎題即可輕易揭開，所有疑難均會得到答案。", "坐鎮從容，談笑卻敵，非關多智，實緣定力，莫謂揮戈挽日，無此事也，占者毋庸引以爲憂。"],
            ["萬籟無聲際，一月正當空，忽被雲遮掩，皓魄反朦朧。", "謹慎維護形象，以突破謠言扭曲，得此籤者有招人忌怨、暗算之危。", "坦白無私之人，忽遭誣謗，因而招尤取怨，誠無妄也，然悠悠之口，何足爲定評，占者不妨安之，不久自可大白矣。"],
            ["一個知音，卻在天邊等，切勿因循，靜夜當思省。", "得籤者為人處事有「曲過高和太寡」之情形，宜檢討修正。", "知音絕少，同道有緣，深夜自思，速宜省悟，占者須急起直追，與善人並駕齊驅，慎勿畏難苟安也。"],
            ["眾犬相聚，礪齒咬牙，搖頭擺尾，只顧看家。", "此籤示人勿為小人群聚時之假象欺騙。", "此籤主同甘共苦，得人死力。桀犬堯，為主則忠，占之者中吉。"],
            ["妻前夫後一同行，好比先機兆已明，君若有情須切記，十年恩義莫忘心。", "有的夫妻，妻強夫弱，得此籤者有娶這種妻室之可能，婚後應重視恩義。", "與人交際，總須有始有終，大忌忘恩背義，反唇相譏，不論夫妻朋友賓主，皆然，占者其敬聽斯言。"],
            ["鼠伏穴，本自寧，一露首，貓即跟，揚威伸爪，鼠喪殘生。", "凡事一動不如一靜，堅守本份相安無事，或寓有應嚴守機密勿使洩露意思。", "宜隱不宜顯，宜讓不宜爭，顯則口舌至，爭則是非生，口舌是非，兇猛如貓，可不畏欺，故當力戒。"],
            ["書中有女顏如玉，書中自有黃金屋，讀盡五車書，志願自能足，何必焦勞心中忙碌。", "得此籤者應切記斯言，不再憂心忡忡，終年勞碌而不讀書。", "玉不琢不成器，人不學不如意，既已飽學，何用躊躇，占之者只須苦學不必以美婦華屋等爲慮也。"],
            ["豹變成文采，乘龍福自臻，赤身成富貴，事事得振新。", "得此籤者將獲佳婿，並因而使生命改觀，榮華富貴享用不盡。", "赤手起家，無美不備，豹變龍興，光華燦然，若能勉力進修，屈指第一無疑，占之上吉。"],
            ["孤陽微兮，群陰溢兮，力既殫兮，將不可耄兮，真謹慎兮，宜可保兮。", "此籤寓有「道消魔長」之意，處此情況唯有謹慎或可保全。", "孤陽不敵群陰，故當屏女色，遠小人，謹身慎行，或有以善其終，戒之慎之。"],
            ["曉雨初晴映碧溪，重重春色上柴扉，黃金不盡家殷富，何必區區羨錦衣？", "此籤示人:家道富裕，宜安於現狀，不必另起為官或經商之念。", "財運亨通，主得巨富，銅山金穴，用之不竭，惟官星不顯，占之大吉。"],
            ["世道多荊棘，人情每用嗟，利名如有路，勤苦逐生涯。", "名利與己與緣，不必在凶險世途上與人爭奪，安份守己勤苦渡日最宜。", "倍受險阻，閱盡滄桑，勤苦一生，始博得微貨末秩，足見事非經過不知難。"],
            ["山窮路轉迷，水急舟難渡，萬事莫強為，出處遭研妒。", "跋山涉水出門遠行，均屬不利，若違拗命運一意孤行，往往會遇怨懟非議事。", "奸凶嫉妒，環我而伺，只宜謹守避禍，切勿妄想，若能積德行善，亦可挽回氣數，"],
            ["時邊多艱，戰戰兢兢，戒謹恐懼，如履薄冰，須識前程危與險，一籠風裡一枝燈。", "時運不佳，未來日子風險更多，得此籤者，須多加謹慎提防為宜。", "行則荊棘，坐則針氈，無時無刻，可稍貽懈，占之者急宜戒謹恐懼，庶免意外之咎。"],
            ["一朵花枝艷更芳，清香馥郁透蘭房，時風吹送終成笑，好句筵前進幾觴。", "得此籤者如為女性，必美且慧，遠近讚美，如為男性則以品德高貴而受頌揚。", "時至運來，春意盎然，功名唾手可得，占之者主動作如意，其吉大矣。"],
            ["自從持守定，功在眾人先，別有非常喜，隨龍到九天。", "一人做任何事，具有恆心、毅力，則其成功機會較大。", "以守爲戰，好整以暇，而意外之喜慶。亦即繼此而來，隨龍到天高上之象，占之者收成必佳。"],
            ["遠涉波濤一葉舟，而今始得過灘頭，年來心事才成就，屈指從前多可憂。", "此籤甚佳，凡事亨通，如尋物得、謀事成、求偶佳、經商利、建屋吉。", "冒險前進，驚魂初定，由今思昔，不堪回溯，占者從此可安然坐享矣。"],
            ["受君之祿，久降禎祥，盈而不覆，守之乃昌，毋怠毋驕，永保安康。", "得籤者久受重用，生活富裕，如起異心或心生驕怠，則可能失去一切。", "開創匪艱，守成維艱，若不善保守，僅一二傳已覆亡矣，何以保之，曰勤曰謙，占者守之，康強逢吉。"],
            ["萬事不由人計較，一生盡是命安排，莫疑猜，命裡有時總有分，何須碌碌混塵埃，休哉！", "謀事在人，成事在天。對一切事物，莫過於貪婪奢求。", "人力難回天命，命中應有者，揮之不去，不應有者，招之不來，居易俟命，最爲上策。"],
            ["一片憂心未肯休，花逢春雨艷難留，得意歸休，失意歸休，仙家只此一籌謀。", "所問諸事均不順遂，因而被重重煩憂困住，婦女得此籤者宜防情感生活有變。", "葉落歸根，人老終死，富貴仍空，貧賤亦暫，憂心焦慮，終然自苦，即真即幻，仙家之秘，占者不必欣欣，更毋庸戚戚也。"],
            ["兩女一夫，上下相祛，陰氣乘陽，用是耗虛。", "對女色之困惑，須加以警惕，不可貪戀也，否則將有耗虛之虞。", "主婦人長舌，惟曆之皆，牝雞司晨，尤亂家政，語雲，若要家不和，討個小老婆，占者慎之。"],

                                                onChange={(e) => setInputNumber(e.target.value)}
                                                placeholder="輸入任意數字..."
                                                className="w-full p-3 border border-stone-300 rounded-lg focus:ring-2 focus:ring-red-800 focus:outline-none text-lg"
                                                autoFocus
                                            />
                                            <p className="text-xs text-stone-400 mt-1">*超過 384 自動扣除循環</p>
                                        </div>
                                        <div>
                                            <label className="block text-stone-600 font-medium mb-1">備註 (欄位 2)</label>
                                            <input 
                                                type="text" 
                                                value={inputText}
                                                onChange={(e) => setInputText(e.target.value)}
                                                placeholder="例如：事業、運勢..."
                                                className="w-full p-3 border border-stone-300 rounded-lg focus:ring-2 focus:ring-red-800 focus:outline-none text-lg"
                                            />
                                        </div>
                                    </div>
                                    
                                    {errorMsg && (
                                        <div className="bg-red-50 text-red-600 p-3 rounded-lg flex items-center text-sm">
                                            <AlertCircle className="w-4 h-4 mr-2" />
                                            {errorMsg}
                                        </div>
                                    )}

                                    <button 
                                        type="submit" 
                                        className="w-full bg-red-800 hover:bg-red-900 text-white font-bold py-3 rounded-lg transition duration-200 flex items-center justify-center text-lg shadow-md"
                                    >
                                        <BookOpen className="w-5 h-5 mr-2" />
                                        送出求籤
                                    </button>
                                </form>
                            </section>

                            {/* 區塊 2: 結果顯示 */}
                            {result && (
                                <section className="bg-white rounded-xl card-shadow overflow-hidden border border-red-100 relative">
                                    <div className="bg-red-50 p-4 border-b border-red-100 flex justify-between items-center">
                                        <h2 className="text-xl font-bold text-red-900 flex items-center">
                                            <span className="bg-red-800 text-white w-8 h-8 rounded-full flex items-center justify-center mr-2 text-sm">2</span>
                                            籤詩結果
                                        </h2>
                                        <div className="text-right text-sm text-red-800 opacity-70">
                                            <div className="font-bold">輸入: {result.originalInput}</div>
                                            <div>求問: {result.note || '無'}</div>
                                        </div>
                                    </div>
                                    
                                    <div className="p-6 md:p-8 space-y-6">
                                        {/* 1) 籤號 */}
                                        <div className="text-center">
                                            <span className="inline-block bg-stone-800 text-amber-400 px-4 py-1 rounded-full text-sm font-bold tracking-widest mb-2">
                                                NO. {result.calculatedIndex}
                                            </span>
                                            <h3 className="text-3xl font-bold text-stone-800">{result.data.簽號}</h3>
                                        </div>

                                        <div className="grid gap-6">
                                            {/* 2) 籤詩 */}
                                            <div className="bg-stone-50 p-5 rounded-lg border-l-4 border-stone-400">
                                                <h4 className="text-stone-500 font-bold text-sm mb-2 uppercase tracking-wide">籤詩</h4>
                                                <p className="text-xl text-stone-800 leading-loose font-serif font-medium">
                                                    {result.data.籤詩}
                                                </p>
                                            </div>

                                            {/* 3) 解籤 */}
                                            <div className="bg-red-50 p-5 rounded-lg border-l-4 border-red-400">
                                                <h4 className="text-red-500 font-bold text-sm mb-2 uppercase tracking-wide">解籤</h4>
                                                <p className="text-lg text-stone-800 leading-relaxed">
                                                    {result.data.解籤}
                                                </p>
                                            </div>

                                            {/* 4) 演繹 */}
                                            <div className="bg-amber-50 p-5 rounded-lg border-l-4 border-amber-400">
                                                <h4 className="text-amber-600 font-bold text-sm mb-2 uppercase tracking-wide">演繹</h4>
                                                <p className="text-lg text-stone-800 leading-relaxed">
                                                    {result.data.演繹}
                                                </p>
                                            </div>

                                            {/* 5) 新增：網路/AI 詳解區塊 */}
                                            <div className="bg-gradient-to-r from-indigo-50 to-blue-50 p-6 rounded-lg border border-indigo-200 shadow-sm relative overflow-hidden">
                                                <div className="absolute top-0 right-0 -mt-2 -mr-2 opacity-10 text-indigo-500">
                                                    <Sparkles width="100" height="100" />
                                                </div>
                                                
                                                <div className="flex items-center mb-3">
                                                    <div className="bg-indigo-600 text-white p-1.5 rounded-lg mr-2 animate-pulse-slow">
                                                        <Sparkles className="w-4 h-4" />
                                                    </div>
                                                    <h4 className="text-indigo-800 font-bold text-lg tracking-wide">
                                                        Google AI / 網路詳解
                                                    </h4>
                                                </div>
                                                
                                                <div className="text-indigo-900/80 text-sm mb-4 leading-relaxed bg-white/60 p-3 rounded border border-indigo-100">
                                                    <p className="font-bold mb-1">💡 提示：</p>
                                                    <p>想知道更白話的解釋、道德寓意或現代應用嗎？</p>
                                                    <p>點擊下方按鈕，即可透過 Google (含 AI 概覽) 查詢此籤詩的詳細解析。</p>
                                                </div>
                                                
                                                <button 
                                                    onClick={handleGoogleSearch}
                                                    className="w-full bg-white hover:bg-indigo-50 text-indigo-600 font-bold py-3 px-4 border-2 border-indigo-200 hover:border-indigo-400 rounded-lg transition duration-200 flex items-center justify-center gap-2 group shadow-sm"
                                                >
                                                    <Search className="w-5 h-5 group-hover:scale-110 transition-transform" />
                                                    <span>Google AI 智能詳解 (搜尋)</span>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </section>
                            )}

                        </div>

                        {/* 右側欄位：歷史紀錄 (佔 1 欄) */}
                        <div className="lg:col-span-1">
                            {/* 區塊 3: 歷史紀錄 */}
                            <section className="bg-white rounded-xl card-shadow p-6 border border-stone-100 sticky top-6">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-xl font-bold text-stone-700 flex items-center">
                                        <span className="bg-red-800 text-white w-8 h-8 rounded-full flex items-center justify-center mr-2 text-sm">3</span>
                                        歷史紀錄
                                    </h2>
                                    {history.length > 0 && (
                                        <button 
                                            onClick={clearHistory}
                                            className="text-stone-400 hover:text-red-600 text-sm flex items-center transition"
                                        >
                                            <Trash2 className="w-4 h-4 mr-1" /> 清空
                                        </button>
                                    )}
                                </div>

                                <div className="space-y-3 max-h-[calc(100vh-200px)] overflow-y-auto custom-scrollbar pr-1">
                                    {history.length === 0 ? (
                                        <div className="text-center py-8 text-stone-400 border-2 border-dashed border-stone-200 rounded-lg">
                                            尚無紀錄
                                        </div>
                                    ) : (
                                        history.map((item, index) => (
                                            <div 
                                                key={index}
                                                onClick={() => loadHistoryItem(item)}
                                                className="group cursor-pointer p-3 rounded-lg border border-stone-200 hover:border-red-300 hover:bg-red-50 transition duration-200 flex justify-between items-center bg-white"
                                            >
                                                <div className="flex-1 min-w-0">
                                                    <div className="flex items-center gap-2 mb-1 flex-wrap">
                                                        <span className="font-bold text-stone-800 text-md">#{item.originalInput}</span>
                                                        <span className="font-bold text-red-800 text-sm whitespace-nowrap">籤 {item.calculatedIndex}</span>
                                                    </div>
                                                    <div className="text-stone-600 text-sm truncate">
                                                        {item.note || "（無備註）"}
                                                    </div>
                                                    <div className="text-xs text-stone-400 mt-1">{item.timestamp}</div>
                                                </div>
                                                <div className="text-stone-300 group-hover:text-red-500 pl-2">
                                                    <ArrowRight className="w-4 h-4" />
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </section>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
